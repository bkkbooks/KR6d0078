body:
  text: 見寶塔品第十一三周法備四衆記圓法身已全本願已足故成多寶塔現示十方三世過現諸佛修證之道也爾時佛前有七寶塔高五百由旬縱廣二百五十由旬從地踊出住在空中種種寶物而裝校之五千欄楯龕室千萬無數幢幡以為嚴飾垂寶瓔珞寶鈴萬億而懸其上四面皆出多摩羅跋栴檀之香充遍世界其諸幡蓋以金銀琉璃𤥭璖瑪瑙真珠玫瑰七寶合成高至四天王宮三十三天雨天曼陀羅華供養寶塔餘諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等千萬億衆以一切華香瓔珞幡蓋伎樂供養寶塔恭敬尊重讚歎戒環曰寶塔殊勝乃果行依報諸莊嚴具彰果行德用也種種莊校即萬德之像五千欄楯即總持之力龕室千萬應慈悲無量也幢幡無數應摧邪表正也垂寶瓔珞即衆善下化寶鈴萬億即法音廣振四面出香表神通四達如意周遍七寶幡蓋高至天宮表衆德尊勝也三十三天下言諸天供塔有如來全身故爾時寶塔中出大音聲歎言善哉善哉釋迦牟尼世尊能以平等大慧教菩薩法佛所護念妙法華經為大衆說如是如是釋迦牟尼世尊如所說者皆是真實戒環曰平等大慧即一乘寶智也爾時有菩薩摩訶薩名大樂說白佛言世尊以何因緣有此寶塔從地踊出又於其中發是音聲爾時佛告大樂說菩薩此寶塔中有如來全身乃往過去東方無量千萬億阿僧祇世界國名寶淨彼中有佛號曰多寶其佛行菩薩道時作大誓願若我成佛滅度之後於十方國土有說法華經處我之塔廟為聽是經故踊現其前為作證明戒環曰多寶滅度全身不散如入禪定而能隨願在處證經此示法身無滅無生自在之力使聞妙法者了無滅生頓悟實相故示現作證如此彼佛成道已臨滅度時於天人大衆中告諸比丘我滅度後欲供養我全身者應起一大塔戒環曰敘塔緣起也其佛以神通願力十方世界在在處處若有說法華經者彼之寶塔皆踊出其前全身在於塔中不獨此處大樂說今多寶如來塔聞說法華經故從地踊出戒環曰結示今緣也是時大樂說菩薩以如來神力故白佛言世尊我等願欲見此佛身戒環曰欲表圓證當現全身此非小緣故假如來神力發起佛告大樂說菩薩摩訶薩是多寶佛有深重願若我寶塔為聽法華經故出於諸佛前時其有欲以我身示四衆者彼佛分身諸佛在於十方世界說法盡還集一處然後我身乃出現耳戒環曰必待十方說法諸佛畢集然後出現者表圓證也分身諸佛即千百億化水月應物者大樂說我分身諸佛在於十方世界說法者今應當集戒環曰蓋當副多寶之願也大樂說白佛言世尊我等亦願欲見世尊分身諸佛禮拜供養爾時佛放白毫一光即見東方百萬億那由他恆河沙等國土諸佛彼諸國土皆以頗梨為地寶樹寶衣以為莊嚴無數千萬億菩薩充滿其中遍張寶慢寶網羅上彼國諸佛以大妙音而說諸法及見無量千萬億菩薩遍滿諸國為衆說法戒環曰此皆釋迦分身在十方說法者南西北方四維上下白毫相光所照之處亦復如是戒環曰遍照十方咸召使集爾時十方諸佛各告衆菩薩言善男子我今應往娑婆世界釋迦牟尼佛所并供養多寶如來寶塔時娑婆世界即變清淨琉璃為地寶樹莊嚴黃金為繩以界八道無諸聚落村營城邑大海江河山川林藪燒大寶香曼陀羅華遍布其地以寶網幔羅覆其上懸諸寶鈴唯留此會衆移諸天人置於他土戒環曰變土將容分身之衆也琉璃為地等者現佛國之淨相無聚落等者滅衆生之染緣移天人置他土如淨名說菩薩斷取大千擲沙界外其中衆生不覺不知是時諸佛各將大菩薩以為侍者至娑婆世界各到寶樹下一一寶樹高五百由旬枝葉花果次第莊嚴諸寶樹下皆有師子之座高五由旬亦以大寶而校飾之爾時諸佛各於此座結加趺坐如是展轉遍滿三千大千世界而於釋迦牟尼佛一方所分之身猶故未盡戒環曰一方即東方也釋迦分身譬如一燈燃百千燈真應無盡而器界有窮故雖大千不能容受釋迦牟尼佛為諸佛當來作故復於八方各更變二百萬億那由他國皆令清淨又移諸天人置於他土所化之國亦以琉璃為地寶樹莊嚴樹高五百由旬枝葉華果次第莊嚴樹下皆有寶師子座高五由旬亦以大寶而校飾之亦無大海江河及目真鄰陀山摩訶目真鄰陀山鐵圍山大鐵圍山須彌山等諸山王通為一佛國土寶地平正寶交露幔覆其上懸諸幡蓋燒大寶香諸天寶華遍布其地及南曰淨名丈室能廣容多座釋迦化土如自在天宮涌出之衆有無量河沙各詣靈山未聞迫窄而此必三變淨土乃能容受分身者特因事顯法耳及南曰目真鄰陀此云石祥邁曰淨名且示不思議境故即丈室而廣容法華意在引權入實故自穢土而三變宗趣有異故建立不同得旨歸根何異也戒環曰淨土妙境生佛本共法身化體物我無虧唯衆生識心自染自局故聖人因分身束之特與開示初於娑婆一變者滅衆生染緣也次於八方再變者遣識心限礙也後於八方復變者廓法界真境也三變之後分身畢集多寶全現者示染緣既滅礙心既遣真境既廓則法身化體當處現前一多圓融隨念自在妙法大旨明此而已故茲因事特與開示也爾時東方釋迦牟尼所分之身百千萬億那由他恆河沙等國土中諸佛各各說法來集於此爾時釋迦牟尼佛見所分身佛悉已來集各各坐於師子之座皆聞諸佛與欲同開寶塔即從座起住虗空中一切四衆起立合掌一心觀佛於是釋迦牟尼佛以右指開七寶塔戶出大音聲如却關鑰開大城門戒環曰此表順道開發也一指聊舉關鍵脫然如來全身於是可見爾時多寶佛於寶塔中分半座與釋迦牟尼佛而作是言釋迦牟尼佛可就此座即時釋迦牟尼佛入其塔中坐其半座結加趺坐戒環曰妙法實除一切圓融物我不分古今一致是以過去多寶與現在釋迦於寶塔共坐二座戒環曰多寶分座所以示三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異斯妙法之極致也故作證如此以大音聲普告四衆誰能於此娑婆國土廣說妙法華經今正是時如來不久當入涅槃佛欲以此妙法華經付囑有在及南曰說證事圓於靈付囑言有在者傳布法利期在得人也戒環曰日月燈明說是經已即於衆唱滅授記付托今佛至此亦云不久涅槃付囑有在足知三周開示至此乃畢此後顯妙勸持別是一番故雖唱滅結經而復有後說總論戒環曰初於法說歎二智明十如全提妙法開佛智見次喻說斥羊鹿示白牛明迷此則墮火宅悟此則造佛地後因緣說顯所迷之通智示教導之遠因滅化城指寶所皆所以開而示之使見自己本來佛性以見是性則無不成佛故領悟之後各示佛記而卒於圓該圓證之事是為三周開示之終也提婆達多品第十二提婆達多此云天授為斛飯王子禱天而生也以名品者明其所授顯法妙利故也爾時佛告諸菩薩及天人四衆吾於過去無量劫中求法華經無有懈倦於多劫中常作國王發願求於無上菩提心不退轉戒環曰此蓋欲以正道優於天下也為欲滿足六波羅密勤行布施心無吝惜象馬七珍國城妻子奴婢僕從頭目髓腦身肉手足不惜軀命戒環曰此蓋欲以正行率彼貪迷也行簡子曰六波羅密者一布施二持戒三忍辱四精進五禪定六智慧也又名六度時世人民壽命無量為於法故捐捨國位委政太子擊鼓宣令四方求法誰為我說大乘者吾當終身供給走使時有仙人來白王言我有大乘名妙法華經若不違我當為宣說王聞仙言歡喜踊躍即隨仙人供給所須採果汲水拾薪設食乃至以身而為牀座身心無倦于時奉事經於千歲為於法故精勤給侍令無所乏戒環曰由道之優俗故君遂無為戒環曰此見兼忘天下惟道是從戒環曰此終身供給也以身為牀座示忘身為法無疲疲厭也佛告諸比丘爾時王者則我身是時仙人者今提婆達多是由提婆達多善知識故令我具足六波羅密慈悲喜捨三十二相八十種好紫磨金色十力四無所畏四攝法十八不共神通道力成等正覺廣度衆生皆因提婆達多善知識故告諸四衆提婆達多却後過無量劫當得成佛號曰天王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊世界名天道及南曰佛告諸比丘下結成因行也告諸四衆下轉記提婆也戒環曰號天王者釋迦資之以成道是為天中天之法王也時天王佛住世二十中劫廣為衆生說於妙法恆河沙衆生得阿羅漢果無量衆生發緣覺心恆河沙衆生發無上道心得無生忍至不退轉戒環曰記其當來住世利被三乘時天王佛般涅槃後正法住世二十中劫全身舍利起七寶塔高六十由旬縱廣四十由旬諸天人民悉以雜華抹香燒香塗香衣服瓔珞幢幡寶蓋伎樂歌頌禮拜供養七寶妙塔無量衆生得阿羅漢果無量衆生悟辟支佛不可思議衆生發菩提心至不退轉戒環曰此言佛滅後正法亦被三乘佛告諸比丘未來世中若有妙法華經提婆達多品淨心信敬不生疑惑者生十方佛前所生之處常聞此經若生人天中受勝妙樂若在佛前蓮華化生及南曰前明釋尊資成因下文明龍女資成佛果皆顯一乘妙利也戒環曰此品明釋迦因行求法以致成佛故聞者淨信不疑斯可遠惡道生佛家也於時下方多寶世尊所從菩薩名曰智積白多寶佛當還本土釋迦牟尼佛告智積曰善男子且待須臾此有菩薩名文殊師利可與相見論說妙法可還本土爾時文殊師利坐千葉蓮華大如車輪俱來菩薩亦坐寶蓮華從於大海娑竭羅龍宮自然涌出住虗空中詣靈鷲山從蓮華下至於佛所頭面敬禮二世尊足修敬已畢往智積所共相慰問却坐一面作證事畢於是告還發起後緣戒環曰序衆之初文殊預會今又從海涌出者智體周遍十方對現如響應聲無去來相但隨機顯法耳今顯龍宮所化之事故示從海出也智積菩薩問文殊師利仁往龍宮所化衆生其數幾何文殊師利言其數無量不可稱計非口所宣非心所測且待須臾自當證知所言未竟無數菩薩坐寶蓮華從海涌出詣靈鷲山住在虗空此諸菩薩皆是文殊師利之所化度具菩薩行皆共論說六波羅密本聲聞人在虗空中說聲聞行今皆修行大乘空義文殊師利謂智積曰於海教化其事如是戒環曰此文殊於龍宮非人所居則所化衆生皆龍類而一聞妙法遂成菩薩足知一切衆生莫不具佛知見只缺開悟耳言本聲聞人等者明所化之機亦具三乘而由推入實也文殊師利言我於海中唯常宣說妙法華經戒環曰此答前偈也智積問文殊師利言此經甚深微妙諸經中寶世所希有頗有衆生勤加精進修行此經速得佛不文殊師利言有娑竭羅龍王女年始八歲智慧利根善知衆生諸根行業得陀羅尼諸佛所說甚深祕藏悉能受持深入禪定了達諸法於剎那頃發菩提心得不退轉辨才無礙慈念衆生猶如赤子功德具足心念口演微妙廣大慈悲仁讓志意和雅能至菩提戒環曰即修行此經速得佛之證也龍宮無數菩薩皆是文殊化度而獨舉八歲龍女成佛者明佛性不問男女不在老成不擇異類但根智之利所造之深剎那𢌞光則菩提可至亦乃破三乘遠繫而進其濡滯也智積菩薩言我見釋迦如來於無量劫難行苦行積功纍德求菩提道未曾止息觀三千大千世界乃至無有如芥子許非是菩薩捨身命處為衆生故然後乃得成菩提道不信此女於須臾頃便成正覺戒環曰此執別教之迹疑圓頓之理言論未訖時龍王女忽現於前時舍利弗語龍女言汝謂不久得無上道是事難信所以者何女身垢穢非是法器云何能得無上菩提佛道懸曠經無量劫勤苦積行具修諸度然後乃成又女人身猶有五障一者不得作梵天王二者帝釋三者魔王四者轉輪聖王五者佛身云何女身速得成佛戒環曰鶖子依小乘教迹辨難示為小智釋疑故也言佛道懸曠女身多障皆小乘教迹也梵王淨行帝釋少欲魔王堅固輪王大仁佛具萬德而女人多染多欲懦弱妬具足煩惱皆反於上故致五障爾時龍女有一寶珠價直三千大千世界持以上佛佛即受之龍女謂智積菩薩尊者舍利弗言我獻寶珠世尊納受是事疾不答言甚疾女言以汝神力觀我成佛復速於此當時衆會皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寶蓮華成等正覺三十二相八十種好普為十方一切衆生演說妙法及南曰經云法性如大海不說有是非凡夫賢聖人平等無高下唯在心垢滅取證如反掌所以龍女才捨法愛遂速成佛也戒環曰珠表妙圓真心持以上佛表捨法愛也法愛不存則妙心無垢成佛之要無速於此故即往南方無垢世界成等正覺也智積菩薩及舍利弗一切衆會默然信受戒環曰妙法顯然神之孰當不信持品第十三品曰持者因上宣付顯觀故衆願持說以廣道化初藥王等願此方持次聲聞衆願他方持後大菩薩願十方持也爾時藥王菩薩摩訶薩及大樂說菩薩摩訶薩與二萬菩薩眷屬俱皆於佛前作是誓言唯願世尊不以為慮我等於佛滅後當奉持讀誦說此經典戒環曰此白寶塔品末顯難勸持故藥王等發大願力不憚其難而願佛無慮後惡世衆生善根轉少多增上慢貪利供養增不善根遠離解脫雖難可教化我等當起大忍力讀誦此經持說書寫種種供養不惜身命及南曰此領入劫燒接須彌喻難之意而發誓也戒環曰雖末世惡暴有如劫燒上慢心高有如須彌難可教化而誓無所避故云當起大忍不惜身命爾時世尊視八十萬億那由他諸菩薩摩訶薩此方他方不該不遍故青蓮𢌞盻意被十方也戒環曰八十萬億乃一方來集之衆是諸菩薩皆是阿跋致轉不退法輪得諸陀羅尼即從座起至於佛前而作是念若世尊告勑我等持說此經者當如佛教廣宣斯法復作是念佛今默然不見告勑我當云何時諸菩薩敬順佛意并欲自滿本願便於佛前作師子吼而發誓言世尊我等於如來滅後周旋往反十方世界能令衆生書寫此經受持讀誦解說其義如法修行正憶念皆是佛之威力唯願世尊在於他方遙見守護戒環曰彼一娑婆尚怯弊惡則十方誠難故歸功佛力復求加護安樂行品第十四萬行依于三業本于智悲總欲不失其正則安而樂不正則危而憂故依文殊正智正身正意大悲四法名安樂行品爾時文殊師利法王子菩薩摩訶薩白佛言世尊是諸菩薩甚為難有敬順佛故發大誓願於後惡世護持讀說是法華經世尊菩薩摩訶薩於後惡世云何能說是經及南曰以文殊請者示依正智發起正行戒環曰請問云何所行乃能說是經得無諸難此發起安樂行法也佛告文殊師利若菩薩摩訶薩於後惡世欲說是經當安住四法繼三業以大悲者三業既正則正智真淨利得己利須起大悲廣行利他智悲相濟乃能演說是經得無諸難戒環曰即四安樂行也一正身行二正語行三正意行四大悲行一者安住菩薩行處親近處能為衆生演說是經及南曰趣操之謂近二者不違於道是謂菩薩行處近處此身行之要也戒環曰二處各有事行理行非事無以涉俗非理無以契真理事兼通真俗不礙然後利生弘法觸處安樂矣文殊師利云何名菩薩摩訶薩行處若菩薩摩訶薩住忍辱地柔和善順而不卒暴心亦不驚及南曰此言事行也祥邁曰行處必住忍者六度適時為用而涉難莫尚於忍蓋趨事而動則悔吝生焉故須忍以御之戒環曰行處必住忍辱者蓋能忍故於剛能柔而物不能挫於逆能順而物不能害於事能審而所施不暴於微能察而所遇不驚由是克成安樂行也又復於法無所行而觀諸法如實相亦不行不分別是名菩薩摩訶薩行處及南曰此言理行也及南曰雖行是法而不住相名無所行蓋有所則有能能所角立物我成敵則患難生而安樂喪矣戒環曰法指一切行法也觀自所行之法而觀諸法也如實相即無所觀亦不行言亦無所行也不分別即情識都忘是非雙泯菩薩趣操如是而已云何名菩薩摩訶薩近處菩薩摩訶薩不親近國王王子大臣官長不親近諸外道梵志尼犍子等及造世俗文筆讚詠外書及路伽耶陀逆路伽耶陀者及南曰此言事行以戒定為體不親近國王等戒近權勢也不親近諸近道等戒近外道也戒環曰雖外護可尊恐挾勢妨道苟志於此則身處山林心懸魏闕能暫安樂乎不親外道息異見也不造俗文絶異端也遠惡議難離曲辨也復次菩薩摩訶薩觀一切法空如實相不顛倒不動不退不轉及南曰合次文言理行即第二近處初親近處以戒定為體第二近處以觀智為體所以融前戒定使圓契實相乃成妙行也及南曰心法一也以倒心觀之則妄境紛拏以實相觀之則真機自寂是故修安樂行貴如實觀戒環曰一切諸法當體真淨不受一塵曰空無動無壞離諸幻妄曰實相菩薩觀一切法空如其實相無所加損故見不顛倒而心無動轉也見不顛倒即頌所謂亦不分別諸法有無是非等也心無動轉即頌所謂攝心不動如須彌山也蓋心法本寂相待成搖由見顛倒則以法為有生有起故於心有動有轉若雲駛故月運也能如實觀則於心不動不退而了法不生不起若風止則波澄也如虗空無所有性一切語言道斷不生不出不起無名無相實無所有無量無邊無礙無障但以因緣有從顛倒生故說常樂觀如是法相是名菩薩摩訶薩第二親近處偈云觀一切法皆無所有猶如虛空無有堅固不生不出不動不退常住一相是名近處及南曰虛空無所有性至無礙無障等常住一相謂無生出動退等異也戒環曰無所有性者生出起滅名相等性皆無也名相皆無則詮示不及故語言道斷無量無邊言如空之不可窮極也無礙無障言如空之不可分辨也實相如是何言說之能及耶則凡可說者但是從緣而有顛倒之法當知不從緣有不從倒生者竟不可說也常如是觀乃能融前事行以成妙行又文殊師利菩薩摩訶薩於後末世法欲滅時受持讀誦斯經典者無懷嫉妬諂誑之心祥邁曰嫉妬諂誑下至戲論諸法皆意地微細邪行故須正之也戒環曰法欲滅時世道交喪邪暴交作人多嫉諂則學佛者易見輕罵而求其長短故戒持經者無懷嫉諂乃因時制行所以息業也若比丘比丘尼優婆塞優婆夷求聲聞者求辟支佛者求菩薩道者無得惱之令其疑悔語其人言汝等去道甚遠終不能得一切種智所以者何汝是放逸之人於道懈怠故及南曰四衆有求三乘者當隨機與進趣忽惱之令失善利從語其人言下皆惱之之事又亦不應戲論諸法有所諍競當於一切衆生起大悲想於諸如來起慈父想於諸菩薩起大師想於十方諸大菩薩常應深心恭敬禮拜於一切衆生平等說法以順法故不多不少乃至深愛法者亦不為多說及南曰顛倒分別諸法有無名戲論諍競皆為意業故應息之戒環曰悲想則愍其迷淪而思濟也父想則依其法化而求怙也師想則景其道行而思濟也於大菩薩為其愍衆行道深心利物故應深心敬之平等言不黨順法言稱理雖後深愛當量所堪貴不失人亦不失言文殊師利是菩薩摩訶薩於後末世法欲滅時有成就是第三安樂行者說是法時無能惱亂得好同學共讀誦是經亦得大衆而來聽受戒環曰文殊下言必使無難之效也得好同學下行是行故樂而得朋寬而得衆聽已能持持已能誦誦已能說說已能書若使人書供養經卷恭敬尊重讚歎戒環曰此使法利展轉浸廣則法雖欲滅末故應成就是第三行又文殊師利菩薩摩訶薩於後末世法欲滅時有持是法華經者於在家出家人中生大慈心於非菩薩人中生大悲心及南曰大乘修行初皆以智正行終皆以悲成智故四安樂行先依正智正業而後大悲利生也戒環曰此言或生大慈或生大悲者慈能與樂悲能愍濟四衆信解佛法名在家菩薩出家菩薩闡提不信名非菩薩以能信解故生大慈而與之法樂以闡提故生大悲而愍其迷失也應作是念如是之人則為大失如來方便隨宜說法不聞不知不覺不問不信不解其人雖不問不信不解是經我得阿耨多羅三藐三菩提時隨在何地以神通力智慧力引之令得住是法中此皆愍其迷失也隨宜說法即開三顯一之法也不聞不知不覺言昏迷自障不問不信不解言顓𫎇自墮然彼雖不問不解菩薩大悲誓終濟度文殊師利是法華經於無量國中乃至名字不可得聞何況得見受持讀誦戒環曰此歎難遇也如此所以愍其不信不解為大失文殊師利譬如強力轉輪聖王欲以威勢降伏諸國而諸小王不順其命時轉輪王起種種兵而往討伐及南曰此喻意明是經所以難聞難見者為陰魔熾盛多怨難信不妄說故戒環曰輪王譬化身佛諸國譬五陰境小王譬五陰等魔不順其命譬無明煩惱未調伏也以威不行而起兵討伐譬但以如來知見力無畏法不能攝伏諸微細惑故設三乘斷治之法是謂起種種兵王見兵衆戰有功者即大歡喜隨功賞賜或與田宅聚落城邑或與衣服嚴身之具或與種種珍寶金銀琉璃𤥭璖瑪瑙珊瑚琥珀象馬車乘奴婢人民戒環曰此譬三乘之衆能伏陰魔隨功淺深獲諸法利唯未與說一乘法也唯髻中明珠不以與之所以者何獨王頂上有此一珠若以與之王諸眷屬必大驚怪明珠用鎮寶位妄與則王屬驚怪法華佛佛授手妄說則衆心驚疑文殊師利如來亦復如是以禪定智慧力得方國土王於三界而諸魔王不肯順伏如來賢聖諸將與之共戰及南曰如輪王振威小王不順遂起種種兵法戒環曰國土即法界真境賢聖將指三乘衆也其有功者心亦歡喜於四衆中為說諸經令其心悅賜以禪定解脫無漏根力之諸法之財又復賜與涅槃之城言得滅度引導其心令皆歡喜而不為說是法華經戒環曰如隨功賞賜而不與髻珠也無漏根力即五根五力諸法之財通指道品利用之法涅槃城即中道止息之權果文殊師利如轉輪王見諸兵衆有大功者心甚歡喜以此難信之珠久在髻中不妄與人而今與之戒環曰言難信珠者賜非其宜則大驚怪如來亦復如是於三界中為大法王以法教化一切衆生見賢聖軍與五陰魔煩惱魔死魔共戰有大功勳滅三毒出三界破魔網爾時如來亦大歡喜此法華經能令衆生至一切智一切世間多怨難信先所未說而今說之戒環曰魔羅此云殺者謂能與苦難殺人慧命也煩惱魔為生死因陰魔死魔為生死果故滅之破之即出三界也多怨為衆魔未伏難信為群機未淳文殊師利此法華經是諸如來第一之說於諸說中最為甚深末後賜與如彼強力之王久護明珠今乃與之戒環曰第一之說如頂上一珠末後賜與如久持大功文殊師利此法華經諸佛如來祕密之藏於諸經中最在其上長夜守護不妄宣說始於今日乃與汝等而敷演之戒環曰祕密如藏髻中最上如在王頂四十餘年於生死長夜守此待機故云長夜守護從地涌出品第十五娑婆界有六萬恆沙菩薩從無數劫修佛智慧是釋尊所化常樂靜處勤行精進故不依人天而住下方空中以示常樂深知無有障礙也全顯妙法所化之迹故以涌出名品爾時他方國土諸來菩薩摩訶薩過八恆河沙數於大衆中起白佛言世尊若聽我等於佛滅後在此娑婆世界勤加精進護持讀誦書寫供養是經典者當於此土而廣說之戒環曰此法集之衆欲從他方來此持經爾時佛告諸菩薩摩訶薩衆止不須汝等護持此經所以者何我娑婆世界自有六萬恆河沙等菩薩摩訶薩一一菩薩各有六萬恆河沙眷屬是諸人等能於我滅後護持讀誦廣說此經戒環曰佛止之者非有違拒為將顯迹顯法故也顯迹者顯佛所化示彼來儀顯法者此固圓足無待於外佛說是時娑婆世界三千大千國土地皆震裂而於其中有無量千萬億菩薩摩訶薩同時涌出戒環曰深智現前大千不礙是諸菩薩身皆金色三十二相無量光明先盡在此娑婆世界之下此界虗空中住戒環曰在此娑婆界下方空中住以示常樂深智無有障礙也是諸菩薩聞釋迦牟尼佛所說音聲從下發來戒環曰此乃文殊所謂心聞洞十方也戒環曰此以真說彼以心聞是諸菩薩從地出已各詣虗空七寶妙塔多寶如來釋迦牟尼佛所到已向二世尊及至諸寶樹下師子座上佛所亦皆作禮合掌恭敬以諸菩薩種種讚法而以讚嘆住在一面欣樂瞻仰於二世尊是諸菩薩摩訶薩從初踊出以諸菩薩種種讚法而讚於佛如是時間經五十小劫是時釋迦牟尼佛默然而坐及諸四衆亦皆默然五十小劫佛神力故令諸大衆謂如半日華嚴云一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力夫能一念普觀無去來住則了斯延促皆方便耳戒環曰聖人神智方便法門能延一日以為一劫能促一劫以為一日蓋道無遷變清有頃久猶如夢人不移一時而夢歷多歲則頃久之情初無定也故聖人對機示現延促而本無延促所言菩薩讚佛經劫則於促示延耳又令大衆謂如半日則於延現促耳所以然者將欲顯發宣示諸佛智慧自在神通之力使忘延促之情而深證實相故也爾時四衆亦以佛神力故見諸菩薩遍滿無量百千萬億國土虗空及南曰四衆肉眼礙而非通而能見無量國土者假佛通力故也戒環曰夫於衆一多牙陳於時延促牙現於見通礙牙用者以明物量無窮時無止分無常而警發常情使去其倒心限意依無礙智圓融妙達繇是進契壽量祕說而得入佛慧成就佛身故也是故此品事法雖為顯迹勸持又為壽量引發也是菩薩衆中有四導師一名上行二名無邊行三名淨行四名安立行是四菩薩於其衆中最為上首唱導之師在大衆前各共觀釋迦牟尼佛而問訊言世尊少病少惱安樂行不所應度者受教易不不令世尊生疲勞耶戒環曰此問居堪忍與民同患之事也爾時世尊於菩薩大衆中而作是言如是如是如來安樂少病少惱諸衆生等易可化度無有疲勞所以者何是諸衆生世世已來常受我化亦於過去諸佛供養尊重種諸善根此諸衆生始見我身聞我所說即皆信受入如來慧除先修習學小乘者如是之人我今亦令得聞是經入於佛慧戒環曰言世世受化正顯壽量本門所化言亦於過去種善則兼明智勝會中所化以化緣深故始見始聞即皆信受爾時釋迦牟尼分身諸佛從無量千萬億他方國土來者在於八方諸寶樹下師子座上結加趺座其佛侍者各各見是菩薩大衆於三千大千世界四方從地踊出住於虗空各白其佛言世尊此諸無量無邊阿僧祇菩薩大衆從何所來爾時諸佛各告侍者且待須臾有菩薩摩訶薩名曰彌勒釋迦牟尼佛之所授記次後作佛已問斯事佛今答之汝等自當因是得聞戒環曰此他衆疑問也及南曰各白其佛白分身也爾時釋迦牟尼佛告彌勒菩薩言善哉善哉阿逸多乃能問佛如是大事汝等當共一心被精進鎧發堅固意如來今欲顯發宣示諸佛智慧諸佛自在神通之力諸佛師子奮迅之力諸佛威猛大勢之力及南曰彌勒姓也號阿逸多此云無能勝大事者智慧神通奮迅威猛所化多衆之事也此宣釋迦化迹而言諸佛者佛佛道同故也戒環曰將欲宣示先令被精進鎧等者戒使勇鋭諦聽無以趣深而生疑退也下云我於娑婆得菩提已教化成就如是多衆即總宣示廣在後文也宣示諸佛智慧即壽量偈云我智力如是慧光照無量是也諸佛自在神通即方便現涅槃而實不滅度是也師子奮迅之力即常說法教化無數億衆生是也威猛大勢之力即令顛倒衆生雖近而不見是也爾時世尊告彌勒菩薩我今於此大衆宣告汝等阿逸多是諸大菩薩摩訶薩無量無數阿僧祇從地踊出汝等昔所未見者我於是娑婆世界得阿耨多羅三藐三菩提已教化示導是諸菩薩調伏其心令發道意戒環曰此答誰說法教化從誰初發心此諸菩薩皆於是娑婆世界之下此界虗空中住戒環曰此答願說所從國土名號於諸經典讀誦通利思惟分別正憶念及南曰此乃稱其德也戒環曰於諸經典能讀以取其理誦以通其義思惟以精之正念以持之則其德足稱矣爾時彌勒菩薩摩訶薩及無數諸菩薩等心生疑惑怪未曾有而作是念云何世尊於少時間教化如是無量無邊阿僧祇諸大菩薩令住阿耨多羅三藐三菩提即白佛言世尊如來為太子時出於釋宮去伽耶城不遠坐於道場得成阿耨多羅三藐三菩提從是已來始過四十餘年世尊云何於此少時大作佛事以佛勢力以佛功德教化如是無量大菩薩衆當成阿耨多羅三藐三菩提世尊此大菩薩衆假使有人於千萬億劫數不能盡不得其邊斯等久遠已來於無量無邊諸佛所植諸善根成就菩薩道常修梵行世尊如此之事世所難信及南曰此乃執迹生疑也及南曰此乃迷壽量遠因故有此疑也戒環曰執伽耶近迹故有此難譬如有人色美髮黑年二十五指百歲人言是我子其百歲人亦指年少言是我父生育我等是事難信及南曰必言二十五及百歲者取其少猶未壯老已過耄益見相違也戒環曰父少譬釋尊闡化之近子老譬涌出成德之久化近力久理不相當佛亦如是得道已來其實未久而此大衆諸菩薩等已於無量千萬億劫為佛道故勤行精進善入出住無量百千萬億三昧得大神通久修梵行善能次第習諸善法巧於問答人中之寶一切世間甚為希有今日世尊方云得佛道時初令發心教化示導令向阿耨多羅三藐三菩提世尊得佛未久乃能作此大功德事戒環曰得佛未久合父少也而此大衆至甚為希有合子老也今日世尊至能作大事合相違也善入出住者於無量三昧或入或出或住妙用自在如來壽量品第十六前情疑久近見起生滅故不能契如實本際此釋其疑滯使知如來本無生滅伽耶之化特為機所受之命法華經稱性無量故曰如來壽量品爾時佛告諸菩薩及一切大衆汝等當信解如來誠諦之語又復告諸大衆汝等當信解如來誠諦之語又復告諸大衆汝等當信解如來誠諦之語戒環曰以壽量之本趣深難信故再三發之心實曰誠言當曰諦一切世間天人及阿修羅皆謂今釋迦牟尼佛出釋氏宮去伽耶城不遠坐於道場得阿耨多羅三藐三菩提然我實成佛已來無量無邊百千萬億那由他劫及南曰此言世間但見其迹而不知本實無量譬如五百千萬億那由他阿僧祇三千大千世界假使有人抹為微塵過於東方五百千萬億那由他阿僧祇國乃下一塵如是東行盡是微塵諸善男子於意云何是諸世界可得思惟校計知其數不戒環曰此如智勝塵墨之喻彌勒菩薩等俱白佛言世尊是諸世界無量無邊非算數所知亦非心力所及一切聲聞辟支佛以無漏智不能思惟知其限數我等住阿跋致地於是事中亦所不達世尊如是諸世界無量無邊爾時佛告大菩薩衆今當分明宣語汝等是諸世界若著微塵及不著者盡以為塵一塵一劫我成佛已來復過於此百千萬億那由他阿僧祇劫戒環曰正明佛壽無量也諸佛壽量悉皆無量衆生壽量亦復如是但迷其智故妄逐生死如一墮地獄至無數劫豈非無量壽耶苟不迷墮則與佛無別矣自從是來我常在此娑婆世界說法教化亦於餘處百千萬億那由他阿僧祇國導利衆生及南曰娑婆及萬億國無非淨土因一法界未嘗壞滅其有壞滅皆別業妄見戒環曰自從是來謂從塵劫成佛已來言常在此又在餘處則不唯身相常住亦顯國土常住也諸善男子如來所演經典皆為度脫衆生或說己身或說他身或示己身或示他身或示己事或示他事諸所言說皆實不虗及南曰此言所演經典說雖異同理無不實也戒環曰己謂釋迦他謂諸佛說見於言示見於行所以者何如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界見於三界如斯之事如來明見無有錯謬以諸衆生有種種性種種欲種種行種種憶想分別故欲令生諸善根以若干因緣譬喻言詞種種說法所作佛事未曾暫廢及南曰釋上理無不實而說有異同也及南曰所作佛事指說示不同之事戒環曰三界萬法不容擬心以衆生妄見則種種紛紜以如來實見則以切真寂無有生死乃至滅度者不以生滅相見也不如三界見於三界者不以往來相見也既明見無滯則宜無異說特以衆生性欲行想之心種種不同故說示教化之迹亦種種不同也諸善男子我本行菩薩道所成壽命今猶未盡復倍上數然今非實滅度而便唱言當取滅度如來以是方便教化衆生及南曰此敘唱滅意也所以者何若佛久住於世薄德之人不種善根貧窮下賤貪著五欲入於憶想妄見網中若見如來常在不滅便起憍恣而懷厭怠不能生難遭之想恭敬之心是故如來以方便說戒環曰釋唱滅意也貧窮下賤言之功德財憶想妄見為生死網即見惑思惑也比丘當知諸佛出世難可值遇所以者何諸薄德人過無量百千萬億劫或有見佛或不見者以此事故我作是言諸比丘如來難可得見斯衆生等聞如是語必當生於難遭之想心懷戀慕渴仰於佛便種善根是故如來雖不實滅而言滅度及南曰言難值遇乃警之令渴仰種善也又善男子諸佛如來法皆如是為度衆生皆實不虗戒環曰明珠佛利生善權皆如是也譬如良醫智慧聰達明鍊方樂善治衆病行簡子曰法華種種譬喻種種皆入妙餘開世方便較然矣此與火宅之喻同出機軸戒環曰佛如醫師教如醫方理如妙藥種種性欲行想分別是謂衆病佛能以若干緣喻隨其所宜發藥而蠲除之是謂良醫善治也其人多諸子息若十二十乃至百數以有事緣遠至餘國諸子於後飲他毒藥藥發悶亂宛轉於地及南曰火宅之子對三乘言故數止三十良醫之子對衆生言故兼至百數戒環曰醫師遠適而諸子飲毒猶宅主近出而其家失火也飲他毒藥喻隨順邪法宛轉于地喻輪墮諸趣是時其父還來歸家諸子飲毒或失本心或不失者遙見其父皆大歡喜拜跪問訊善安隱歸我等愚癡誤服毒樂願見救療更賜壽命父見子等苦惱如是依諸經方求好藥草色香美味皆悉具足搗篩和合與子令服而作是言此大良藥色香美味皆悉具足汝等可服速除苦惱無復衆患及南曰聖人病人之病憂人之憂調御之德蓋見於此戒環曰三界之家佛所舊化故云來歸彼中邪毒深者失其良心淺者雖或未失亦為惡習所障未能親造覺體故云遙見願賜壽命即冀不夭閼於橫邪也發藥除苦即令其斷惑而證真也依諸佛經濟之方求聖賢斷治之藥顯性空之真色示戒定之五香品乳酪之五味無不具足也搗者折剛為柔篩者化粗入細和合令服則無矯佛之失色味香美則無瞑眩之毒其諸子中不失心者見此良藥色香俱好即便服之病盡除愈餘失心者見其父來雖亦歡喜問訊求索治病然與其藥而不肯服所以者何毒氣深入失本心故於此好色香藥而謂不美戒環曰此喻化有父作是念此子可愍為毒所中心皆顛倒雖見我喜求索救療如是好藥而不肯服我今當設方便令服此藥即作是言汝等當知我今衰老死時已至是好良藥今留在此汝可取服勿憂不差作教教已復至他國遣使還告汝父已死戒環曰此喻權示滅偈謂我為世父救諸苦患者為凡夫顛倒實在而言滅此也及南曰留藥喻遺教去國喻示滅是時諸子聞父背喪心大憂惱而作是念若父在者慈愍我等能見救護今者捨我遠喪他國自惟孤露無復恃怙常懷悲感心遂醒悟乃知此藥色味香美即取服之毒病皆愈戒環曰此喻感問從化行簡子曰人情常忽於所賴常感於去思往往如此其父聞子悉已得差尋便來歸咸使見之戒環曰此喻障盡見佛及南曰水澄月現亦何去來諸善男子於意云何頗有人能說此良醫虗妄罪不不也世尊戒環曰此覆審誕信佛言我亦如是成佛已來無量無邊百千萬億那由他阿僧祇劫為衆生故以方便力言當滅度亦無有能如法說我虗妄過者戒環曰導迷貴權於法無過分別功德品第十七造道證性淺深不同佛為隨根稱揚之故曰分別功德爾時大會聞佛說壽命劫數長遠如是無量無邊阿僧祇衆生得大饒益戒環曰得大饒益如下所說於是世尊告彌勒菩薩摩訶薩阿逸多我說是如來壽命長遠時六百八十萬億那由他恆河沙衆生得無生法忍戒環曰因聞壽量了無生滅以無生法忍可成行無了無忍名為法忍忍者行之成名復有千倍菩薩摩訶薩得聞持陀羅尼門行簡子曰此門字即圓覺所謂陀羅尼門得出一切是也戒環曰一聞千悟得大總持諸餘總持自此而出故謂之門佛說是諸菩薩摩訶薩得大法利時於虗空中雨曼陀羅華摩訶曼陀羅華以散無量百千萬億寶樹下師子座上諸佛并散七寶塔中師子座上釋迦牟尼佛及久滅度多寶如來亦散一切諸大菩薩及四部衆又雨細抹旃檀沉水香等於虗空中天鼓自鳴妙聲深遠又雨千種天衣垂諸瓔珞真珠瓔珞摩尼珠瓔珞如意珠瓔珞遍於九方衆寶香爐燒無價香自然周至供養大會一一佛上有諸菩薩執持幡蓋次第而上至於梵天是諸菩薩以妙音聲歌無量頌讚歎諸佛戒環曰諸瑞皆從空雨遍於九方乃助顯壽量法利如空無邊不可得而思議也故彌勒讚曰世尊說壽量不可思議法多有所饒益如虛無邊言九方者除下方非法會所菩薩執幡上至梵天言其滿空供養讚歎也爾時佛告彌勒菩薩摩訶薩阿逸多其有衆生聞佛壽命長遠如是乃至能生一念信解所得功德無有限量戒環曰解壽量說即得不壞體證真常用故功無限量又阿逸多若有聞佛壽命長遠解其言趣是人所得功德無有限量能起如來無上之慧何況廣聞是經若教人聞若自持若教人持若自書若以華香瓔珞幢幡繒蓋香油蘇燈供養經卷是人功德無量無邊能生一切種智及南曰壽量之說趣在斷生滅見顯真常體苟能明解則起無上慧等同如來故功無限量戒環曰聞佛壽命則斷生滅見顯真常體能起上慧而已廣聞是經則具四知見盡一乘道故能生種智也然世之聞持不計而果能起上慧生種智者誰耶是亦遇王膳而不餐得衣珠而醉臥惜哉阿逸多若人聞我說壽命長遠深心信解則為見佛常在耆闍崛山共大菩薩諸聲聞衆圍繞說法戒環曰生滅見盡則真常之相觸目宛然又見此娑婆世界其地琉璃坦然平正閻浮檀金以界八道寶樹行列諸臺樓觀皆悉寶成其菩薩衆咸處其中若有能如是觀者當知是為深信解相戒環曰穢淨情忘則勝妙之境舉步皆是戒環曰身土實相本自一如生滅穢淨皆出情見故見盡情忘則真常之相勝妙之境觸處現前非深信解壽量祕說莫預於此隨喜功德品第十八隨喜者謂未能一心聽讀如說修行但隨其所聞喜為人說隨其所教喜須臾聞聞獲勝福故以命品爾時彌勒菩薩摩訶薩白佛言世尊若有人聞是法華經隨喜者得幾所福爾時佛告彌勒菩薩摩訶薩阿逸多如來滅後若比丘比丘尼優婆塞優婆夷及餘智者若長若幼聞是經隨喜已從法會出至於餘處若在僧坊若空間地若城邑巷陌聚落田里如其所聞為父母宗親善友知識隨力演說是諸人等聞已隨喜復行轉教餘人聞已亦隨喜轉教如是展轉至第五十戒環曰法會初聞從師親授其福最勝隨喜轉教則去師漸遠至第五十言又甚遠而福亦無量如下所校三校最後福五阿逸多其第五十善男子善女人隨喜功德我今說之汝當善聽若四百萬億阿僧祇世界六趣四生衆生卵生胎生濕生化生若有形無形有想無想非有想非無想無足二足四足多足如是等在衆生數者有人求福隨其所欲娛樂之具皆給與之一一衆生與滿閻浮提金銀琉璃硨磲瑪瑙瑚琥珀諸妙珍寶及象馬車乘七寶所成宮殿樓閣等戒環曰僧祇世界生類不窮而能以寶物等施其福多矣天人鬼畜分為六趣胎卵濕化總為四生而形想等類預焉自胎卵至非無想通該三界十種異生如是布施滿八十年已而作是念我已施衆生娛樂之具隨意所欲然此衆生皆已衰老年過八十髮白面皺將死不久我當以佛法而訓導之即集此衆生宣布法化示教利喜一時皆得須陀洹道斯陀含道阿羅漢道盡諸有漏於深禪定皆得自在具八解脫戒環曰既以財施復以法施令得聖果則其福倍多法師功德品第十九此言五種功備六千德圓可為為模範故曰法師功德前法師品依持經人以彰圓記此依持經人以彰圓德名同而義則異也爾時佛告常精進菩薩摩訶薩若人受持是法華經若讀若誦若解說若書寫是人當得八百眼功德千二百耳功德八百鼻功德千二百舌功德八百身功德千二百意功德以是功德莊嚴六根皆令清淨祥邁曰千二八百此乃攘依世論數量以顯妙用大略而已使由常眼對色而開佛智見常耳聞聲而得其實相則衆塵不隔十方廓然萬象莫逃大千圓照則千二八百之功無足論矣如經云父母所生眼悉見三千界何復三分之闕八百之劣耶故知此體本絶數量也戒環曰持法華者開佛知見則見聞覺知無非真覺證諸實相則色香味觸無非真法以真覺對真法則萬象徹照大千一視故圓持功成即得六根清淨功德自非精心不雜進道不倦未易能致故告常精進菩薩也數有千二八百者衆生世界依器世界而立以識妄為界故有四方身相遷流故有三世惟世與界二者相涉三世四方宛轉十二依十二數流變三疊成千二百圓持功成每根各全其用故有千二功德然復於中尅定優劣以眼見前傍而不及後鼻息出入闕於中交身合能覺離不知觸皆三分闕一故唯八百功德是善男子父母所生清淨肉眼見於三千大千世界內外所有山林河海亦見其中一切衆生及業因緣果報生處悉見悉知行簡子曰清淨肉眼有生皆具凡能開佛知見證諸實相則大千一切莫不歷然此其現量也以迹明之人人知見若離前塵本無限礙且日月之高太虗之遠不知其幾千萬里苟無所蔽目能見之而意之所緣其疾俯仰之間再撫四海之外非假賢智凡人能知則六根之用廣大靈通固如是也戒環曰父母所生即人人本具者清淨肉眼即衆塵不隔者衆塵不隔則正智現前故大千內外一切色像悉見悉知所謂應眼時如千日萬象不能逃影質者此也問理則然矣事若之何曰六湛圓明本所功德現量如是但隨所證耳夫小羅漢見小千大羅漢見大千辟支見百佛世界菩薩見百千佛界如來見微塵國土非獨果禮也阿那律陀不離父母生身而能觀大千猶如掌內則其中一切烏乎不見蓋塵消覺淨冥極則一夫何理然而事不然哉楞嚴曰逆彼業流得循圓通與不圓根日劫相倍即不可狥於業流以不圓根而疑經之說也誠知眼力如是則下之五根不假詳論復次常精進若善男子受持此經若誦若讀若解說若書寫得千二百耳功德以是清淨耳聞三千大千世界內外種種語言音聲戒環曰六湛實相在眼圓照在耳圓通以要言之三千大千世界中一切內外所有諸聲雖未得天耳以父母所生清淨常耳皆悉聞知如是分別種種音聲而不壞耳根戒環曰信謂應耳時如幽谷大小音聲無不足也不壞耳根者雖分別種種種而耳根於中本相如故無壞無雜此耳之實相也復次常精進若善男子受持是經若讀若誦若解說若書寫成就八百鼻功德以是清淨鼻根聞於三千大千世界上下內外種種諸香雖聞此香然於鼻根不壞不錯若欲分別為他人說憶念不謬戒環曰清淨言衆塵不隔湛圓故大千俱聞及南曰不壞不錯言無壞無雜也戒環曰華嚴鬻香長者善能別知天人龍鬼所有諸香治諸病香斷諸惡香乃至一切菩薩差別地位香悉皆了達得調和香法門表於善惡熏習之法一切通達而調治和融以成萬德法身香也今鼻根功德能知天上人間諸香乃至菩薩身香亦表持法華者能通達異習和融衆妙而證萬德法身之香歟復次常精進若善男子受持是經若讀若誦若解說若書寫得千二百舌功德若好若醜若美不美及諸苦澀物在其舌根皆變成上味如天甘露無不美者戒環曰好醜苦澀皆屬妄塵於此無染得清淨舌則苦澀美惡皆成法味復次常精進若善男子受持是經若讀若誦若解說若書寫得八百身功德得清淨身如淨琉璃衆生喜見戒環曰於是體中能知琉璃不容纖翳則孰不喜見其身淨故三千大千世界衆生生時死時上下好醜生善處惡處悉於中現戒環曰淨言不為情塵染蔽也不以情塵自蔽則當體無所不現二三界形色及鐵圍山大鐵圍山彌樓山摩訶彌樓山等諸山及其中衆生悉於中現若聲聞辟支佛菩薩諸佛說法皆於身中現其色像楞嚴云浮塵幻化虛妄稱相妙覺明體常自瑩然含吐十方循業發現故得是體者無所不現戒環曰昔者阿難大衆蒙佛開示身心蕩然得無礙各各自知心遍十方含容萬有反觀父母所生之身如大虗一塵巨海一漚起滅無從了然不礙此其證也復次常精進若善男子如來滅後受持是經若讀若誦若解說若書寫得千二百意功德以是清淨意根乃至聞一偈一句通達無量無邊之義戒環曰聞一句而達無量義蓋無量義不出一句解是義已能演說一句一偈至於一月四月乃至一歲諸所說法隨其義趣皆與實相不相違背若說俗間經書治世語言資生業等皆順正法及南曰或一月一際一歲而演一句偈用意根精了達無量義也戒環曰九旬談妙蓋得諸此西天歲分三際謂雨際熱際寒際四月即一際也證意實相則諸所說法無非實相故不相違背雖說俗事亦順正法三千大千世界六趣衆生心之所行心所動作心所戲論皆悉知之戒環曰由意清淨故他心通也所行即循常心也動作即感變心也戲論即分別也雖未得無漏智慧而其意根清淨如此是人有所思惟籌量言說皆是佛法無不真實亦是先佛經中所說戒環曰為得意根清淨實相與佛同體故行簡子曰此經純談諸法實相開佛知見故於六根功德一一發明儻能脫去情塵以清淨根照清淨境遂見山林周匝禽獸鳴呼醭鼻沾唇殊形異意無非實相無非妙法即一身而圓證遍六處而常彰本不缺虧曾無礙經文方便駢旁開示行人應須充擴悟入也常不輕菩薩品第二十常不輕者釋迦前身威音王時精持妙法廣施利導之迹也以佛性義遍記四衆於善則拜逢惡不怒一切見敬故號不輕爾時佛告得大勢菩薩摩訶薩汝今當知持法華經者若有誹謗獲大罪報如前所說其所得功德如向所說眼耳鼻舌身意清淨及南曰將顯精持先此者所以警衆使知持毀之報不謬而深信精持廣利也得大勢即大勢至也戒環曰謗毀之罪如喻品末與法師品說聞持之福如法師功德品說得大勢乃往古昔過無量無邊不可思議阿僧祇劫有佛名威音王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊劫名離衰謂名大成祥邁曰綿歷往古事千億佛無相無我精持廣利非具法力大勢難勝其任故告得大勢菩薩也戒環曰威音王者以大音聲普遍世界為諸法王說法無畏也故不輕既得其道即能於衆說法心無所畏劫名離衰謂世道交興國名大成言正化無缺其威音王佛於彼世中為天人阿修羅說法為求聲聞者說應四諦法度生老病死究竟涅槃為求辟支佛者說應十二因緣法為諸菩薩因阿耨多羅三藐三菩提說應六波羅蜜法究竟佛慧戒環曰此敘威音亦說三乘也因阿耨菩提者因無上道為說六度使由是而趣證菩提究竟佛慧得大勢是威音王佛壽四十萬億那由他恆河沙劫正法住世劫數如一閻浮提微塵像法住世劫數如四天下微塵其佛饒益衆生已然後滅度正法像法滅盡之後於此國土復有佛出亦號威音王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如是次第有二萬億佛皆同一號戒環曰亦如初後燈明二萬皆同一號為道同故所敘多佛明釋迦往因之曠遠也最初威音王如來既已滅度正法滅後於像法中增上慢比丘有大勢力爾時有一菩薩比丘名常不輕得大勢以何因緣名常不輕是比丘凡有所見若比丘比丘尼優婆塞優婆夷皆悉禮拜讚歎而作是言我深敬汝等不敢輕慢所以者何汝等皆行菩薩道當得作佛祥邁曰衆生佛性本自圓成世間業行皆順正法凡能觀一切行皆菩薩道知一切人皆當作佛夫何輕慢之有戒環曰此以佛性義遍記四衆也四衆容行不等而不輕以佛性等之故皆悉禮拜深敬以謂皆行菩薩道皆當作佛以其常作是語故增上慢比丘比丘尼優婆塞優婆夷號之為常不輕戒環曰此雙結名行也得大勢於意云何爾時常不輕菩薩豈異人乎則我身是若我於宿世不受持讀誦此經為他人說者不能疾得阿耨多羅三藐三菩提我於先佛所受持讀誦此經為人說故疾得阿耨多羅三藐三菩提戒環曰此明精持成己之道以致今日其道愈光如來神力品第二十一此菩薩申請如來即現神力嘉讚經德以起信心使廣流布故曰如來神力品爾時千世界微塵等菩薩摩訶薩從地涌出者皆白佛言世尊我於佛滅後世尊分身所在國土滅度之處當廣說此經所以者何我等亦自欲得是真淨大法受持讀誦解說書寫而供養之戒環曰即涌出品佛所化衆於前顯跡勸持於此伸請通也廣說即利他受持即自利爾時世尊於文殊師利等無量百千萬億舊住娑婆世界菩薩摩訶薩及諸比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切衆前現大神力出廣長舌上至梵世一切毛孔放於無量無數色光皆悉遍照十方世界及南曰華嚴云幻師之幻法能現種種事修羅變作身齊等須彌山龍上瞬息雨悅澤遍天下彼具貪瞋癡神力尚如是何况法界慧具足自在力然則舌至梵世光遍十方特法界慧中一微用耳舊住菩薩即在此娑婆下方住者梵世即初禪天戒環曰出廣長舌上至梵世者現辨說之神力也放無量光遍照十方者現智照之神力也將讚經德先現神力始自出舌放光以至震動諸天通達佛土終乃結云若以如是神力於億萬劫說此經德猶不能盡者極顯斯勝妙也如來神力乃法界體中無作妙用衆寶樹下師子座上諸佛亦復如是出廣長舌放無量光此釋迦分身諸佛亦以同道助發釋迦牟尼佛及寶樹下諸佛現神力時滿百千歲然後還攝舌相一時謦咳俱共彈指是二音聲遍至十方諸佛世界地皆六種震動戒環曰於數寸之舌現至梵世一會之頃現百千歲又一警咳彈指而其聲能遍十方震大地皆顯神力勝妙以要言之如來一切所有之法如來一切自在神力如來一切祕要之藏如來一切甚深之事皆於此經宣示顯說戒環曰所有之法即道場所得者自在神力即稱性示現者祕要之藏即法之不可示者甚深之事即心之不可傳者皆於此經是故汝等於如來滅後應一心受持讀誦解說書寫如說修行所在國土若有受持讀誦解說書寫如說修行若經卷所住之處若於園中若於林中若於樹下若於僧坊若白衣舍若在殿堂若山谷曠野是中皆應起塔供養所以者何當知是處即是道場諸佛於此得阿耨多羅三藐三菩提諸佛於此轉于法輪諸佛於此而般涅槃當知是處已下明諸佛修證始終不離此法故所在之處皆應欽奉囑纍品第二十二以言託之曰囑以法系之曰纍蓋此經以智立體以行成德前之開佛知見立體之法既備故說囑纍以明之爾時釋迦牟尼佛從法座起現大神力以右手摩無量菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祇劫修習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等應當一心流布此法廣令增益如是三摩諸菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祇劫修習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等當受持讀誦廣宣此法令一切衆生普得聞知戒環曰再三摩頂示諄勤也首楞嚴等諸祕密教謂之佛頂表無上法諸佛授記付囑皆摩其頂表授無上法也無量菩薩即從地涌出者所以者何如來有大慈悲無諸慳吝亦無所畏能與衆生佛之智慧如來智慧自然智慧如來一切衆生之大施主汝等亦應隨學如來之法勿生慳吝及南曰所以今廣宣此法者使學如來三行與諸衆生施大法利也佛智離二乘見如來智離菩薩見自然智離諸證取悟通唯一乘實智戒環曰一大慈悲行平等慈濟二無慳吝行竭內外財三無所畏行不憚煩難如是乃能興諸衆生三種智慧於未來世若有善男子信如來智慧者當為演說此法華經使得聞知為令其人得佛慧故若有衆生不信受者當於如來餘深妙法中示教利喜汝等若能如是則為已報諸佛之恩祥邁曰信如來智慧謂能信種智趣向一乘者當為說是經令得佛慧而不滯二乘也戒環曰餘深妙法指權漸教也亦曰深妙者是法皆為一佛乘故汝等下乃所謂將此深心奉塵剎也藥王菩薩本事品第二十三藥王名喜見菩薩精苦為法燒身燃臂於釋迦法中最善受持者令示其本因使人跂慕故以名品如藥王燒身妙音隨應觀音之普門妙嚴之轉邪普賢之勸發皆示實相行境使人忘情絶解隨行悟入也爾時宿王華菩薩白佛言世尊藥王菩薩云何遊於娑婆世界世尊是藥王菩薩有若干百千萬億那由他難行苦行善哉世尊願少解說諸天龍神夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等又他國土諸來菩薩及此聲聞衆聞皆歡喜戒環曰此品因宿王華發起者為明宿世弘經自在之因爾時佛告宿王華菩薩乃往過去無量恆河沙劫有佛號日月淨明德如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊戒環曰智慧真光幽明並燭不為物纍故號日月淨明德其佛有八十億大菩薩摩訶薩七十二恆沙大聲聞衆戒環曰眷屬法侶三乘體具佛壽四萬二千劫菩薩壽命亦等彼國無有阿修羅等及以諸難行簡子曰阿修羅無端正也是為非天神地平如掌琉璃所成寶樹莊嚴寶帳覆上垂寶華幡寶瓶香爐周遍國界七寶為臺一樹一臺其樹去臺盡一箭道此諸寶樹皆有菩薩聲聞而座其下諸寶臺上各有百億諸天作天伎樂歌歎於佛以為供養戒環曰樹去臺一箭道言其蔭廣也爾時彼佛為一切衆生喜見菩薩及衆菩薩諸聲聞衆說法華經戒環曰藥王尊經自此始是一切衆生喜見菩薩樂習苦行於日月淨明德佛法中精進經行一心求佛滿萬二千歲已得現一切色身三昧戒環曰此即深證實相行境也華嚴多舉過量劫數直明以無限智悲修如是行曾無限量之心此經過量之數凡皆如之戒環曰精進一心滿萬二千歲而後得現一切色身者一切色聲不離根塵中現所言滿萬二千歲即依根塵十二處圓融㸦照至於功行滿足之時也圓融㸦照得其實相則知根根塵塵一切色法交徹融攝重重無盡是名滿萬二千歲得現一切色身三昧得此三昧已心大歡喜即作念言我得現一切色身三昧皆是得聞法華經力我今當供養日月淨明德佛及法華經即時入是三昧於虗空中雨曼陀羅華摩訶曼陀羅華細末堅黑栴檀滿虗空中如雲而下又雨海此岸栴檀之香此香六銖價直娑婆世界以供養佛戒環曰此三昧香非人間比所以六銖價直娑婆也二十四銖為一兩六銖言少分耳爾時日月淨明德佛告一切衆生喜見菩薩善男子我涅槃時到滅盡時至汝可安施床座我於今夜當般涅槃又勑一切衆生喜見菩薩善男子我以佛法囑纍於汝及諸菩薩大弟子并阿耨多羅三藐三菩提法亦以三千大千七寶世界諸寶樹寶臺及給侍諸天悉付於汝戒環曰佛法通指三乘菩提法別指大乘菩薩弟子言法衆三千寶界言化境寶樹給侍言所御我滅度後所有舍利亦付囑汝當令流布廣設供養應起若干千塔如是日月淨明德佛勑一切衆生喜見菩薩已於夜後分入於涅槃戒環曰勑以舍利起塔者戒定餘勳欲霑無際故也若干者不定之數意任其緣力耳爾時一切衆生喜見菩薩見佛滅度悲感懊惱戀慕於佛即以海此岸栴檀為𧂐供養佛身而以燒之火滅已後收取舍利作八萬四千寶瓶以起八萬四千塔高三世界表剎莊嚴埀諸幡蓋懸衆寶鈴及南曰現滅不滅聖意所知而悲感戀慕者示與衆生同一悲仰耳須彌四海剡部居南言海此岸即南岸出美栴檀積之為𧂐以奉闍維示誠敬也戒環曰佛說火化之法在己則顯三昧之力播熏練之力故化火自焚舍利迸透在人則掩臭腐之穢免螻蟻之食使其魄不滯其神清升而此方以臥淤膿於荒郊埋腐骸於朽壤為是且以火化為不忍方其穴地負土全體而坑之為可忍耶二皆出於不得已耳達者觀之一等歸盡則臥淤埋腐不若火化之愈矣自道觀之沉之可也露之可也衣薪而棄諸溝中衮文而納諸石槨無不可者奚足為焚瘞之競爾時一切衆生喜見菩薩復自念言我雖作是供養心猶未足我今當更供養舍利便語諸菩薩大弟子及天龍夜叉等一切大衆汝等當一心念我今供養日月淨明德佛舍利作是語已即於八萬四千塔前燃百福莊嚴臂七萬二千歲而以供養令無數求聲聞衆無量阿僧祇人發阿耨多羅三藐三菩提心皆使得住現一切色身三昧及南曰昔之求佛滿萬二千歲今之然臂復七倍其久者言益以無限智悲行菩薩大行如其智悲有限何足以化無數無量之人戒環曰昔之然身為離相見今復然臂為除法執故令小乘離諸見執發正道心根境圓融故皆得住現身三昧也爾時諸菩薩天人阿修羅等見其無臂憂惱悲哀而作是言此一切衆生喜見菩薩是我等師教化我者而今燒臂身不具足戒環曰愛見未忘故哀其不足此初心菩薩而已于時一切衆生喜見菩薩於大衆中立此誓言我捨兩臂必當得佛金色之身若實不虗令我兩臂還復如故作是誓已自然還復由斯菩薩福德智慧淳厚所致及南曰我執能生煩惱諸衆生死法執能生所知礙正知見捨一存一則為二乘故捨兩臂必當得佛還復如故者若果得佛即無所捨矣此非淺薄所能故稱淳厚戒環曰臂之於手為辟能役衆指而我無所役則兩臂表我執法執根本也當爾之時三千大千世界六種震動天雨寶華一切人天得未曾有以非常之事感非常之瑞人天因是得大法利也宿王華若有發心欲得阿耨多羅三藐三菩提受持此法華經乃至一四句偈其福最多戒環曰一偈超悟非限量福宿王華譬如一切川流江河諸水之中海為第一此法華經亦復如是於諸如來所說經中最為深大戒環曰川流江河已異於溝港而海為深大如來所說已異於小乘而此為第一及南曰此以下俱廣顯勝德又如土山黑山小鐵圍山大鐵圍山及十寶山衆山之中須彌山為第一此法華經亦復如是於諸經中最為其上環須彌之外有土山黑山而堅大不及鐵圍大海之內有十寶山而貴高不及須彌戒環曰土山黑山譬人乘天乘之經鐵山寶山譬二乘菩薩乘之經須彌則譬一乘之經故曰最上又如衆星之中月天子最為第一此法華經亦復如是於千萬億種諸經法中最為照明戒環曰諸經設法微茫漸顯如星之照此經頓悟圓融廓徹如月之明又如日天子能除諸暗此經亦復如是能破一切不善之暗戒環曰日光出時不與冥合人得正智諸暗自除如佛為諸法王此經亦復如是諸經中王戒環曰總而舉之以圓顯勝德也及南曰顯經勝德只此可盡而必引諸義者明妙法隨機在處皆勝故也宿王華此經能救一切衆生者此經能令一切離諸苦惱此經能大饒益一切衆生充滿其願戒環曰此下廣顯勝功如清凉池能滿一切諸渴乏者如寒者得火如裸者得衣如商人得主如子得母如渡得船如病得醫如暗得燈如貧得寶如民得王如賈客得海如炬除暗此法華經亦復如是能令衆生離一切苦一切病痛能解一切生死之縛戒環曰衆生衆苦病痛縛著皆因迷妄能開佛知見則一切皆離若人得聞此法華經若自書若使人書所得功德以佛智慧籌量多少不得其邊不復為貪欲所惱亦復不為瞋恚愚癡所惱亦復不為憍慢嫉妬諸垢所惱戒環曰貪嗔癡為根本煩惱嬌嫉等垢為隨煩惱既生安養所依者淨業所會者善人故無垢惱也得菩薩神通無生法忍得是忍已眼根清淨以是清淨眼根見七百萬二千億那由他恆河沙等諸佛如來華嚴十地菩薩功圓智滿心鏡交徹能見多百佛至多百千億那由他佛其意同此戒環曰心法俱寂而能照用名菩薩神通無生法忍心寂根淨故能見多佛妙音菩薩品第二十四妙音者深體妙法能以妙音隨應演說而流通是道名雖妙音實彰妙音則不滯言詮能隨應則不局心迹不局不滯所以為妙行也爾時釋迦牟尼佛放大人相肉髻光明及放眉間白毫相光遍照東方百八萬億那由他恆河沙等諸佛世界行簡子曰佛有九十七種大人相肉髻頂其一過是數已有世界名淨光莊嚴其國有佛號淨華宿王智如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊為無量無邊菩薩大衆恭敬圍繞而為說法釋迦牟尼佛白毫光明遍照其國華嚴舉菩薩所從來國表所行行本所事佛表所證果淨光莊嚴即依智之行淨華宿智即依行之智智行乎嚴因果合體妙音妙行依此示現爾時一切淨光莊嚴國中有一菩薩名曰妙音久已植衆德本供養親近無量百千萬億諸佛而悉成就甚深智慧戒環曰植德供佛成就深智言福慧兩足得妙幢相三昧法華三昧淨德三昧宿王戲三昧無緣三昧智印三昧解一切衆生語言三昧集一切功德三昧清淨三昧神通遊戲三昧慧炬三昧莊嚴王三昧淨光明三昧淨藏三昧不共三昧日旋三昧得如是等百千萬億恆河沙等諸大三昧及南曰三昧此云正定圓覺云三昧正受者謂正定中受用之法簡異邪受非謂梵語三昧此云正受也故寶積云三昧及正受戒環曰妙幢相者摧邪表正而不住相也法華三昧深入一乘證諸實相淨德三昧衆德真淨物莫能染宿王戲者本智自在無所滯著無緣則照而常寂智印參合萬法解一切語言謂了皆真說集一切功德謂萬德圓備清淨三昧纖塵不立神通遊戲變現自在慧炬以能破癡暗莊嚴王以總攝妙行淨光明者得妙智明淨藏者得法眼藏不共謂二乘不及日旋則大千圓照得如是等河沙三昧謂交徹融攝重重無盡皆妙音所具也由具此故能成妙行流通妙法爾時淨華宿王智佛告妙音菩薩汝莫輕彼國生下劣想善男子彼娑婆世界高下不平土石諸山穢惡充滿佛身卑小諸菩薩衆其形亦小而汝身四萬二千由旬我身六百八十萬由旬汝身第一端正百千萬福光明殊妙是故汝往莫輕彼國若佛菩薩及國土生下劣想妙音菩薩白其佛言世尊我今詣娑婆世界皆是如來之力如來神通遊戲如來功德智慧莊嚴及南曰三德皆稱如來者謂今我所往其力用其神變其莊嚴皆假如來之德皆出如實之道則於一切法無不如矣同復勝劣之異哉是以現種種形說種種法而於神通智慧無所損減為如故也戒環曰娑婆佛身乃隱勝現劣比光嚴勝身在分別心遂生劣想如來正見本絶異同故宿王以彼此異迹為告而妙音以如來三德而答示無劣想也於是妙音菩薩不起于座身不動搖而入三昧以三昧力於耆闍崛山去法座不遠化作八萬四千衆寶蓮華閻浮檀金為莖白銀為葉金剛為鬚甄叔迦寶以為其臺戒環曰將與八萬菩薩俱共發來故先現此瑞甄叔迦此云鸚鵡寶赤如其觜故爾時文殊師利法王子見是蓮華而白佛言世尊是何因緣先現此瑞有若干千萬蓮華閻浮檀金為莖白銀為葉金剛為鬚甄叔迦寶以為其臺戒環曰此皆行境依智示現故假文殊智體而問爾時釋迦牟尼佛告文殊師利是妙音菩薩摩訶薩欲從淨華宿王智佛國與八萬四千菩薩圍繞而來至此娑婆世界供養親近禮拜於我亦欲供養聽法華經戒環曰此乃釋尊垂答也文殊師利白佛言世尊是菩薩種何善本修何功德而能有是大神通力行何三昧願為我等說是三昧名字我等亦欲勤修行之行此三昧乃能見是菩薩色相大小威儀進止唯願世尊以神通力彼菩薩來令我得見戒環曰請問之辭皆為機發爾時釋迦牟尼佛告文殊師利此久滅度多寶如來當為汝等而現其相時多寶佛告彼菩薩善男子來文殊師利法王子欲見汝身戒環曰文殊願世尊以神通力為現妙音而世尊反命多寶者多寶以神通願力在處證經欲假其神通願力故也于時妙音菩薩於彼國沒與八萬四千菩薩俱共發來及南曰此乃妙音來覲也戒環曰與八萬四千菩薩俱來者示妙行隨應廣化塵勞也所經諸國六種震動皆悉雨於七寶蓮華百千天樂不鼓自鳴戒環曰蓮華遍雨天樂自鳴表妙行隨處示現妙音離於作意是菩薩目如廣大青蓮華葉正使和合百千萬月其面貌端正復過於此身真金色無量百千功德莊嚴威德熾盛光明照曜諸相具足如那羅延堅固之身戒環曰此言其四萬二千由旬之相好也和合猶聚集也肇法師云那羅延天力士名端正殊妙志力雄猛戒環曰此示以法寶莊嚴法身入七寶臺上升虗空去地七多羅樹諸菩薩衆恭敬圍繞而來詣此娑婆世界耆闍崛山到已下七寶臺以價值百千瓔珞持至釋迦牟尼佛所頭面禮足奉上瓔珞而白佛言世尊淨華宿王智佛問訊世尊少病小惱起居輕利安樂行不四大調和不世事可忍不衆生易度不無多貪欲嗔恚愚癡嫉妬慳慢不無不孝父母不敬沙門邪見不善心不攝五情不世尊衆生能降伏諸魔怨不久滅度多寶如來在七寶塔中來聽法不又問訊多寶如來安隱少惱堪忍久住不白佛下問世居堪忍事也貪恚癡慢等皆堪忍度之事五情言五欲諸魔言五陰戒環曰上皆宿王傳問之辭世尊我今欲見多寶佛身唯願世尊示我令見寶塔高遠仗佛求見表尊敬耳爾時釋迦牟尼佛語多寶佛是妙音菩薩欲得相見時多寶佛告妙音言善哉善哉汝能為供養釋迦牟尼佛及聽法華經并見文殊師利等故來至此爾時華德菩薩白佛言世尊是妙音菩薩種何善根修何功德有是神力戒環曰華德即妙莊嚴王後身欲助揚妙因故發此問佛告華德菩薩過去有佛名雲雷音王多陀阿伽度阿羅訶三藐三佛陀國名現一切世間劫名喜見祥邁曰佛名雲雷音者一音利閠開覺群動戒環曰國名現一切世間若根身器界皆能隨應也劫名依上而立由利潤隨應故時衆喜見妙音菩薩於萬二千歲以十萬種伎樂供養雲雷音王佛并奉上八萬四千七寶鉢以是因緣果報今生淨華宿王智佛國有是神力樂宣法音鉢為應器樂獻十萬種伎示欲廣宣妙法鉢奉八萬四千示欲應化塵勞故今果有妙音隨應之神華德於汝意云何爾時雲雷音王佛所妙音菩薩伎樂供養奉上寶器者豈異人手今此妙音菩薩摩訶薩是華德是妙音菩薩已曾供養親近無量諸佛久植德本又植恆河沙等百千萬億那由他佛華德汝但見妙音菩薩其身在此而是菩薩現種種身處處為諸衆生說是經典戒環曰妙音觀音應化皆能現十界身自天人獄鬼畜修羅名六凡聲聞辟支菩薩佛名四聖是為十界華德是妙音菩薩能救護娑婆世界諸衆生者是妙音菩薩如是種種變化現身在此娑婆國土為諸衆生說是經典於神通變化智慧無所損減是菩薩以若干智慧明照娑婆世界令一切衆生各得所知於十方恆河沙世界中亦復如是祥邁曰言種種變而神智無損者前所謂得如來三德能一切如故也言智慧明照者方便開導也各得所知者隨類各解也戒環曰此有三節初牒在此娑婆救濟二牒神變智照之力三牒此方如是十方亦然是謂廣顯也若應以聲聞形得度者現聲聞形而為說法應以辟支佛形得度者現辟支佛形而為說法應以菩薩形得度者現菩薩形而為說法應以佛形得度者即現佛形而為說法如是種種隨所應度而為現形乃至應以滅度而得度者示現滅度華德妙音菩薩摩訶薩成就大神通智慧之力其事如是戒環曰此應四聖華德妙音乃結答也爾時華德菩薩白佛言世尊是妙音菩薩深種善根世尊是菩薩住何三昧而能如是在所變現度脫衆生戒環曰此乃請問三昧也佛告華德菩薩善男子其三昧名現一切色身妙音菩薩住是三昧中能如是饒益無量衆生戒環曰如淨摩尼隨方現色妙行流通期至於此說是妙音菩薩來往品時四萬二千天子得無生法忍華德菩薩得法華三昧及南曰此所謂以妙行成實相之德戒環曰無生法忍者證妙法之體法華三昧者得實相之用觀世音菩薩普門品第二十五單發為聲雜比為音於世間衆苦雜聲齊觀並救號觀世音妙圓之行自一心出應無不遍號曰普門戒環曰此維前品說者妙音現形說法救濟衆難與觀音無異但略而未普妙而未圓觀音不離是行而能觀其音聲隨響而答大千圓應無去來相所謂自在之業普門示現則進於妙音其實二聖一道相為始終耳及南曰後頌觀音之德而兼云妙音是知二聖一道也即妙音之行而演為普門是知相為始終也爾時無盡意菩薩即從座起偏袒右肩合掌向佛而作是言世尊觀世音菩薩以何因緣名觀世音若愚讚云世界無邊塵擾擾衆生無數業茫茫愛河無底浪滔滔是故我名無盡意觀音之行亦若是矣戒環曰將顯普門而因無盡意發起者表普門圓行應現無盡也佛告無盡意菩薩善男子若有無量百千萬億衆生受諸苦惱聞是觀世音菩薩一心稱名觀世音菩薩即時觀其音聲皆得解脫戒環曰此於衆苦雜聲齊觀並救也玉琳法師稱名七日而免難於唐孫敬德誦經千遍而全生於魏即脫諸戒環曰於音言觀者以觀智應物之謂觀即真觀淨觀皆慧慈悲是也觀觀之體聞聞之性本無苦樂衆生不能返聞循聲流轉故受諸苦惱觀音不隨聲塵妄起知見故一切解脫而令苦衆生持其名蒙其觀者亦得解脫實真淨慈悲觀力加被故也若有持是觀世音菩薩名者設入大火火不能燒由是菩薩威神力故若為大水所漂稱其名號即得淺處戒環曰此言脫外業也若有百千萬億衆生為求金銀琉璃硨磲瑪瑙珊瑚琥珀真珠等寶入於大海假使黑風吹其船舫漂墮羅剎鬼國其中若有乃至一人稱觀世音菩薩名者是諸人等皆得解脫羅剎之難以是因緣名觀世音昔于相國問黑風漂墮之義於紫玉玉呼名諷之公悖然變色玉曰便是黑風漂墮則凡不能離循循聲流轉一念漂墮皆如是也戒環曰楞嚴明十四無畏功德一者由我不自觀音以觀觀者令苦衆生觀其音聲即得解脫夫不自觀音以觀觀者即離塵復性之真觀也離塵復性則諸妄自脫故能令苦衆生蒙我真觀即得解脫二者知見旋復則火不能燒三者觀聽旋復則水不能溺蓋見覺屬火聞聽屬水知見旋則離火塵聞聽施則離水塵幻塵既離真性斯復所以無能燒溺也能旋見德則煩惱之火貪愛之水皆無能燒溺矣四者滅妄斷殺則鬼不能害皆由離塵復性之觀力加被也無盡意觀世音菩薩摩訶薩威神之力巍巍如是戒環曰結外業也若有衆生多於淫欲常念恭敬觀世音菩薩便得離欲戒環曰此言脫內業也此由熏聞離塵色所不劫之力加之戒環曰衆生以欲習合塵故為色劫一蒙妙力則欲愛乾枯根境不偶雖有妖色不能劫動故便得離欲無盡意觀世音菩薩有如是等大威神力多所饒益是故衆生常應心念戒環曰此結內業也無盡意菩薩白佛言世尊觀世音菩薩云何遊此娑婆世界云何而為衆生說法方便之力其事云何及南曰此三十二應也戒環曰觀音於楞嚴會上自說我昔供養觀音如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土始自佛身終至人非人等為三十二皆以無作妙力自在成就佛告無盡意菩薩善男子若有國土衆生應以佛身得度者觀世音菩薩即現佛身而為說法應以辟支佛身得度者即現辟支佛身而為說法應以聲聞身得度者即現聲聞身而為說法戒環曰但舉三聖者妙音品開菩薩位此則合在佛位應讀為膺當其根而應之也應以梵王身得度者即現梵王身而為說法應以帝釋身得度者即現帝釋身而為說法應以自在天身得度者即現大自在天身而為說法應以天大將軍身得度者即現天大將軍身而為說法應以毗沙門身得度者即現毗沙門身而為說法梵王為初禪天主帝釋為忉利天主自在天居欲界頂大自在天居色界頂天大將軍統領鬼神四天王統領世界毗沙門居北方為最尊無盡意是觀世音菩薩成就如是功德以種種形遊諸國土度脫衆生戒環曰此乃結所現也爾時持地菩薩即從座起前白佛言世尊若有衆生聞是觀世音菩薩品自在之業普門示現神通力者當知是人功德不少祥邁曰觀音之號或曰觀世音或曰觀自在其行或曰普門或曰圓通者依悲觀慈觀應物之德言之故號觀世音依真觀淨觀照心之功言之故號觀自在自一心而出應無不遍則謂之普門自萬物而反照無不融則謂之圓通其實一而已戒環曰持地菩薩昔遇毗舍浮佛教之干持心地則一切皆平是能以妙法內自心使外患自平不能為害者也故聞此品深讚其功意顯自在之業普門之行實為心地法門聞持之人苟能以是平持心地則外患自平不能為害可以於諸怖畏能施無畏由是自在之業普門之行遂為己有故曰若有聞者當知是人功德不少觀音或以自在為號或以自在名業以自在為號言心得自在如心經稱觀自在菩薩是也以自在名業言行得自在如楞嚴稱無作妙力是也然諸法行無非示使平持心地故此終以持地讚顯佛說是普門品時衆中八萬四千衆生皆發無等等阿耨多羅三藐三菩提心及南曰觀音體此以成普門行隨類應化與物為等故聞其風者發如是心此等謂以圓行成最上之德戒環曰無等等者無等即物無與等等者俱物為等既物無與等而能與物為等此如來最上德也陀羅尼品第二十六陀羅尼華言總持念慧妙力諸佛密語能以一字總無量法持無量我摧邪立正殄惡生善皆總而持之之謂也爾時藥王菩薩即從座起而白佛言世尊若善男子有能受持法華經者若讀誦通利若書寫經卷得幾所福佛告藥王若有善男子供養八百萬億那由他恆河沙等諸佛於汝意云何其所得福寧為多不甚多世尊佛言若善男子能於是經乃至受持一四句偈讀誦解義如說修行功德甚多藥王即喜見後身苦行持經志存弘護故發起此品然持經功德前品屢明如法師品比功不過供十萬億佛隨喜品比功不過施諸外物及得小果而已至此功則勝供八百萬億河沙佛者明持行益深獲功益勝也戒環曰將伸弘護先問得福者使後世知其持行益深獲功益勝而為弘護耳妙莊嚴王本事品第二十七昔四比丘結契山林精持妙法一人分衛見王威仗忽生愛著因是感生為王號妙莊嚴今敘其本事欲使行人以道自衛外防見魔內絶惡覺消息邪緣入佛知見也爾時佛告諸大衆乃往古世過無量無邊不可思議阿僧祇劫有佛名雲雷音宿王華智多陀阿伽度阿羅訶三藐三佛陀國名光明莊嚴劫名喜見彼佛法中有王名妙莊嚴其王夫人名曰淨德有二子一名淨藏二名淨眼淨德者雖示染身其德本淨藏者妙理之所蘊淨眼者妙智之所顯皆其德所具也以具妙淨理智故能轉邪而為華德是二子有大神力福德智慧久修菩薩所行之道所謂檀波羅蜜尸羅波羅蜜羼提波羅蜜毗梨耶波羅蜜禪波羅蜜般若波羅蜜方便波羅蜜慈悲喜捨乃至三十七品助道法皆悉明了通達補注曰念以觀法勤以進修足以趣證根能不力能不屈覺能決了正能惣攝皆相因而設也心性如大地念處如種子正勤如種植神足如抽芽五根如根五力如莖七覺如花八正如果二子悉具所謂具躰者也戒環曰方便非六度之數而通濟六度慈悲喜捨名四無量心大乘行法以四心為體六度為用道品為助乃成佛果而二子皆悉明了通達三十七品者身受心法為四念處此惡生善為四正勤欲勤心觀為四神足信進念定慧為五根五根伏魔外為五力慧擇覺喜輕安捨為七覺支見思語業命進念定為八正道也又得菩薩淨三昧日星宿三昧淨光三昧淨色三昧淨照明三昧長莊嚴三昧大威德藏三昧於此三昧亦悉通達補注曰淨光能現衆像淨色不為形凝淨照照了萬法長莊嚴非素法身大威德藏具大神用戒環曰淨三昧者淨藏淨眼之所本也日星宿表本智別智之照用也爾時彼佛欲引導妙莊嚴王及愍念衆生故說是法華經戒環曰此言宿王說經於是二子白父母言善哉父母願時往詣雲雷音宿王華智佛所親近供養所以者何佛難得值如優曇鉢羅華又如一眼之龜值浮木孔而我等宿福深厚生值佛法是故父母當聽我等令得出家所以者何諸佛難值時亦難遇阿含云妙高山下海中有一眼之龜一孔之木龜得木孔可濟沉溺然其木流繞須彌三千年乃一相值且以一眼趍一孔為至難戒環曰喻佛法難值如此蓋衆生偏見自溺而聖人且不世出故也彼時妙莊嚴王後宮八萬四千人皆悉堪任受持是法華經淨眼菩薩於法華三昧久已通達淨藏菩薩已於無量百千萬億劫通達離諸惡趣三昧欲令一切衆生離諸惡趣故其王夫人得諸佛集三昧能知諸佛祕密之藏祥邁曰此敘合宮有德易為勸化也王及後宮為當機淨藏淨眼為能教機教相契所以易化也戒環曰後宮之德根機純利淨眼之德妙達實相淨藏之德善能接濟夫人之德深知法要集三昧者諸佛會要三乘指歸也故得是三昧則能知祕藏爾時彼佛為王說法示教利喜王大歡悅行簡子曰上言佛為王說法下言王捨法𢌞心爾時妙莊嚴王及其夫人解頸真珠瓔珞價值百千以散佛上於虗空中化成四柱寶臺臺中有大寶牀敷百千萬天衣其上有佛結加趺坐放大光明施珠瓔化成法空之座柔忍之衣寶覺之體乃佛力示現以發其正念爾時妙莊嚴王作是念佛身希有端嚴殊特成就第一微妙之色及南曰此則邪心拼絶正念現前故得受記戒環曰時王一覩勝相頓覺世間幻惑之色無可愛樂故深讚佛身微妙之色時雲雷音宿王華智佛告四衆言汝等見是妙莊嚴王於我前合掌立不此王於我法中作比丘精勤修習助佛道法當得作佛號娑羅樹王國名大光劫名大高王其娑羅樹王佛有無量菩薩衆及無量聲聞其國平正功德如是佛號取廣陰群生國名取破諸邪暗劫名取超諸貴高皆符其因行以一念淨信風化臣妾使皆得法利即廣蔭行破邪行也由是捨王位得佛位即超諸貴高也其王即時以國付弟與夫人二子并諸著屬於佛法中出家修道王出家已於八萬四千歲常勤精進修行妙法華經過是已後得一切淨功德莊嚴三昧於八萬四千歲修法華行所以淨治塵勞也過是以後謂塵勞既淨則三昧現前遂轉邪見染莊嚴為功德淨莊嚴也佛說是妙莊嚴王本事品時八萬四千人遠塵離垢於諸法中得法眼淨及南曰此以正力助成德行也戒環曰塵謂邪見垢謂邪染外遠見塵內離垢染則法眼圓明絶諸瑕翳矣普賢菩薩勸發品第二十八此經始於文殊問答終於普賢勸發二十八品條理一貫蓋智能發覺所以作始行能成德所以成終德無不遍佑上利下以成果後常行以盡妙覺之道故名普賢勸發爾時普賢菩薩以自在神通力威德名聞與大菩薩無量無邊不可稱數從東方來祥邁曰以不離常行無為應物故曰自在神通以德無不遍名無不聞故曰威德名聞與無邊菩薩俱來者示萬行圓攝無盡也戒環曰普賢統事法界圓具萬行即事而真其應身無乎不在且於法會之終示從東方來者東方震帝之所出也以法會至此因地智圓果地覺滿十一地妙圓之行備則進修之功已盡妙覺之體已成於是依無功用行出震利物故示從東來華嚴過十一地說佛海功德既終即說如來出現利世間行即此意也所經諸國普皆震動雨寶蓮華作無量百千萬億種種伎樂戒環曰妙音來儀亦雨蓮華作伎樂皆所以彰頭妙行宣流法音也白佛言世尊我於寶威德上王佛國遙聞此娑婆世界說法華經與無量無邊百千萬億諸菩薩衆共來聽受唯願世尊當為說之及南曰寶威德上王者利行自在之號也普賢既具自在威德又言從寶威德上王佛國來者明其示現蓋體諸佛自在利行戒環曰普賢心聞能洞十方故曰遙聞若善男子於如來滅後云何能得是法華經及南曰得者得之以成德行也戒環曰前之所問唯修持讀說而已獨此問云何能得是經欲人人自得也佛告普賢菩薩若善男子成就四法於如來滅後當得是法華經一者為諸佛護念二者植衆德本三者入正定聚四發救一切衆生之心如是成就四法於如來滅後必得是經為佛護念謂道契佛心植衆德本謂福慧兩辦入正定聚即體佛妙體也發救生心即行佛妙行也四法成就乃能真得是經以成普賢常行爾時普賢菩薩白佛言世尊於後五百歲濁惡世中其有受持是經典者我當守護除其衰患令得安隱使無伺求得其便者若魔若魔子若魔女若魔民若為魔所著者若夜叉若羅剎若鳩槃茶若毗舍闍若吉蔗若富單那若韋陀羅等諸惱人者皆不得便行簡子曰夜叉勇健鬼也羅剎捷疾鬼也鳩槃茶魔鬼也其形似甕毗舍闍顛鬼也戒環曰普賢常行無復己利純是利他故自此皆則流通法化護持經人無別行相毗舍闍惱害鬼韋陀羅厭禱鬼世尊我今以神通力故守護是經於如來滅後閻浮提內廣令流布使不斷絶爾時釋迦牟尼佛讚言善哉善哉普賢汝能護助是經令多所衆生安樂利益汝已成就不可思議功德深大慈悲從久遠來發阿耨多羅三藐三菩提意而能作是神通之願守護是經我當以神通力守護能受持普賢菩薩名者普賢若有受持讀誦正憶念修習書寫是法華經者當知是人則見釋迦牟尼佛如從佛口聞此經典當知是人供養釋迦牟尼佛當知是人佛讚善哉當知是人為釋迦牟尼佛手摩其頭當知是人為釋迦牟尼佛衣之所覆戒環曰此助宣正憶念福以成普賢前說也則見釋迦如從口聞等者謂能正憶念則即是經而見佛不滯於名相即是法而造妙不異於親聞也是謂供佛謂能作佛事為佛所讚謂深契佛心摩頂言得果有期衣覆言成柔忍行皆由憶念之正故冥證若此是故普賢若見受持是經典者當起遠迎當如敬佛說是普賢勸發品時恆河沙等無量無邊菩薩得百千萬億旋陀羅尼三千大千世界微塵等諸菩薩具普賢道戒環曰此結勸崇尚也祥邁曰自藥王品進至於此為以行契智常然大用之門華嚴法終善賊復見文殊普賢為以行契智果法大用常然之門其意同此及南曰此皆最後勸發使得萬億旋陀羅尼及具是普賢道也戒環曰萬億旋陀羅尼即遍一切處之行也普賢道即遍一切處之體也說賢品無量菩薩皆得是行剎塵菩薩皆具是體者妙法終談智行體用一切圓備故聞品成行若此其至即所謂以常行成不德之德是乃法華實相之極證也
