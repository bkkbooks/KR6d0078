body:
  text: 天台曰發秘密之奧藏稱之為妙示權實之正軌故號為法指久遠之本果喻之以蓮會不二之圓道譬之以花聲為佛事稱之為經圓詮之初目之為序此經蕩化城之執教廢草菴之滯情開方便之權門示真實之妙理會眾善之小行歸廣大之一乘文愽義深餘經莫及山谷意曰梵云薩達磨此云妙法或云正法盖薩字之中含攝二義故秦本妙法晉本正法皆無失也具十妙義獨勝餘經故云妙也一乘真宗中道了義故云正也住持真理為物軌範故云法也蓮華梵云奔茶利迦此云白蓮華白為眾色之本一乘為餘乘之宗故取喻之如下經中初放白毫之光終賜白牛之駕是此義也蓮華者居泥不染因果齊彰喻前妙法開權顯實會三歸一明佛知見不同餘經法喻雙題故云妙法蓮華經梵云素呾纜此云契經契謂契理契機經謂貫攝常法即契理合機之教故云契經今略契字務從前簡也白樂天序法華院石壁金字經云開上悟入諸佛知見以了義度無邊以圓教垂無窮莫尊於妙法蓮華經是經也三乘之要首萬佛之秘藏盡矣序品第一行簡子曰此經二十八品初序分一品二正宗分十九品三流通分八品如是我聞一時佛住王舍城耆闍崛山中及南曰華嚴展轉十處為圓彰法戒圓覺依大光明藏為直示本起此依人間之城者同染淨以明蓮華之義據古佛之處者示祖述以繼燈明之道耳戒環曰如是之法我從佛聞此阿難結集時升座最初之唱以證法有所授而已王舍城即靈山所附之城摩竭陀國之屬境也即西域人間耆闍崛山此云鷲頭山從形得名即古佛住處以古佛所住故稱靈鷲與大比丘眾萬二千人俱皆是阿羅漢諸漏已盡無復煩惱逮得己利盡諸有結心得自在戒環曰三界因果皆為他事知斷功德乃名己利乃堪為人天福田故號應供律文凡於應供須忖己德行全缺者使忖己利也盖夫苦身而作端坐而食擎跪而拜逆立而受苟無己利之德其害非細行人識之祥邁曰佛隨眾止千二百五十人今言萬二千者兼他方所集也阿羅漢義翻殺賊亦曰應供亦曰不生善淵之心不能全一粘湛發識流逸奔境名漏諸漏者謂欲漏有漏無明漏皆以粘湛妄識為體為三界煩惱之本煩惱即貪嗔癡等十使為諸漏之緣戕害法身偪惱正性名煩惱賊言漏盡無惱者以本盡故緣無是謂殺賊也己利即證智斷惑之事諸有結者即惑習之業為二十五有之生因以因盡則果亡是謂不生也小乘有定無慧為偏溥未得自有名之自在乃定慧兩足俱解脫矣其名曰阿若憍陳如摩訶迦葉優樓頻螺迦葉伽耶迦葉那提迦葉舍利弗大目犍連摩訶迦旃延阿㝹樓䭾劫賓那憍梵波提離婆多畢凌伽婆蹉薄拘羅摩訶俱絺羅難陀孫陀羅難陀富樓那彌多羅尼子須菩提阿難羅睺羅如是眾所知識大阿羅漢等增一阿含云憍陳初悟解優樓供養眾伽耶伏諸結那提善教化劫賓知星宿憍梵受天供離婆不倒亂畢凌能苦坐薄拘壽不夭俱絺善答難孫陀容挺特各第一也戒環曰此舉萬二千人領袖上德即十大弟子之列也佛有十大弟子為法王法臣各備眾德權示專門輔弼大化故大迦葉頭陀第一身子智慧第一目連神通旃延論議阿㝹天眼富那說法善吉解空阿難多聞波離持律羅云蜜行各居第一如孔門十哲之列是其常數今從憍陳至羅云有二十人者旁兼眾德圓彰法化也亦各有第一之德菩薩摩訶薩八萬人皆於阿耨多羅三藐三菩提不退轉皆得陀羅尼樂說辯才轉不退轉法輪供養無量百千諸佛於諸佛所植眾德本常為諸佛之所稱歎以慈修身善入佛慧通達大智到於彼岸名稱普聞無量世界能度無數百千眾生戒環曰菩薩摩訶薩者謂菩薩中之大菩薩也阿耨菩提云無上正真也陀羅尼云總持謂得一切智總持萬法也祥邁曰內德通達則有見而化者外德普聞則有聞而化者故其所度至於無數百千皆大菩薩之德地前無所矣及南曰樂說辯即四辯之想八地已上名不退位五地七地得陀羅尼說決定法名不退輪諸皆離德也住不退位者得是道以處己轉不退輪者運是道以利人此自覺覺他之德也以慈修身者意在供濟善入佛慧謂能運漚和通達大智則所證者明到於彼岸則所造者實此內德也由是充實著現故名稱普聞此外德也故能度眾生其名曰文殊師利菩薩觀世音菩薩得大勢菩薩常精進菩薩不休息菩薩寶掌菩薩藥上菩薩勇施菩薩寶月菩薩月光菩薩滿月菩薩大力菩薩無量力菩薩越三界菩薩䟦陀婆羅菩薩彌勒菩薩寶積菩薩導師菩薩如是等菩薩摩訶薩八萬人俱此經以智立体故文殊居首盖文殊具大智妙德為法身体為諸佛師為世間眼開佛知見莫先於此餘各表此經之德也盖由大智開佛知見而助智以悲歷脩中德乃至道邪人正則一乘之体具方行之用全矣不及普賢者自觀音已下皆普賢之行但初且以智立体開佛知見終至以行成德乃見普賢各專表也戒環曰觀音助智行悲大勢具大德用精進念不退轉不息億劫勤修寶掌掌握法寶藥王應機發藥勇施一切能捨寶月覺體明淨月光能除痴闇滿月兼上二德大力負荷大法無量力對境不動越三界不現身意䟦陀羅善護正見彌勒以慈續佛寶積能聚能利導師導邪入正此八萬之上首一經之表法也爾時世尊四眾圍繞供養恭敬尊重讚歎為諸菩薩說大乘經名無量義教菩薩法佛所護念佛說此經已結跏趺坐入於無量義處三昧身心不動祥邁曰示於一理一動一寂之開莫不具無量義然後可入妙法無量義經云無量義者從一實相生無量法眾集先說無量義經經畢復入無量義定者所以發妙法端緒也爾時佛放眉間白毫相光照東方萬八千世界靡不周遍戒環曰一光周亘全彰妙体也白毫即本覺妙明東方為不動智境萬八千界依根塵識十八界言也及南曰眾生迷此本明本智成十八界自為限礙難造妙體故將說法華先現此瑞使行人直下自發本明照了本智則根塵識界通為智境無復限痴廓達圓融故言萬八千界并見彼諸比丘比丘尼優婆塞優婆夷諸修行得道者復見諸菩薩摩訶薩種種因緣種種信解種種相貌行菩薩道復見諸佛般涅槃者復見諸佛般涅槃後以佛舍利起七寶塔祥邁曰世間萬法自識境觀之悉皆幻惑莫得其實自智境觀之如是性相因緣如是果報本末咸一妙明無非實相若諸眾生本明洞發本智現前則廓照圓現與佛不殊妙体實相昭昭心目矣及南曰始自比丘四眾修行得道次見菩薩諸佛行相終至涅槃起塔是現眾生諸佛之始終也一光東照周亘圓現如此詳悉者直依智境示諸法實相也爾時彌勒菩薩作是念今者世尊現神變相以何因緣而有此端今佛世尊入於三昧是不可思議現希有事當以問誰誰能答者復作此念是文殊師利法王之子已曾親近供養過去無量諸佛必應見此希有之相我今當問爾時比丘比丘尼優婆塞優婆夷及諸天龍鬼神等咸作此念是佛光明神通之相今當問誰爾時彌勒菩薩欲自決疑又觀四眾比丘比丘尼優婆塞優婆夷及諸天龍鬼神等眾會之心而問文殊師利言以何因緣而有此瑞神通之相放大光明照于東方萬八千土悉見彼佛國界莊嚴戒環曰彌勒為補處之主欲作當來之利故於此示疑以問文殊為世間之眼欲發群盲之智故於後援占以證是謂助發爾時文殊師利語彌勒菩薩摩訶薩及諸大士善男子等如我惟忖今佛世尊欲說大法雨大法雨吹大法螺擊大法鼓演大法義諸善男子我於過去諸佛曾見此瑞放斯光已即說大法是故當知今佛現光亦復如是欲令眾生咸得聞知一切世間難信之法故現斯瑞戒環曰雨以一味沾洽螺以一音亘微鼓以號令群眾義以開發隨宜及南曰即往證今啟人之信從也諸善男子如過去無量無邊不可思議阿僧祇劫爾時有佛號日月燈明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊阿僧云無數劫云時分欲原光端本始而推之於無數不思之劫者此光此法固始於無始超乎數量也佛號日月灯者日顯晝月顯夜灯則照於日月所不照而通乎晝夜之道相續無窮彼佛妙智真明兼三者之德故以為號戒環曰佛十號初言本終言迹中言德本謂真性一切如也故曰如來迹謂化道人天尊仰故曰世尊德即萬德種智事也為良福田故應供養圓具四智故能正遍知萬行真明曰明行足善入塵勞窮盡萬法曰善逝世間解證無等等曰無上士化物不暴挺然不屈曰調御丈夫三界模範曰天人師自他覺滿曰佛總而言之從如實道來具萬德應物為世所尊之號也演說正法初善中善後善其義深遠其語巧妙純一無雜具足清白梵行之相為求聲聞者說應四諦法度生老病死究竟涅槃為求辟支佛者說應十二因緣法為諸菩薩說應六波羅蜜令得阿耨多羅三藐三菩提成一切種智祥邁曰四諦者菩寂集道也祥邁曰十二因緣者無明緣行緣識緣名色緣六入緣觸緣受緣愛緣執緣取緣有緣生緣也及南曰於聲聞言涅槃於辟支菩薩言種智者聲聞厭生死苦取滅諦小果故進之於究竟涅槃辟支利智菩薩大根故成之以一切種智一切種智唯佛能具戒環曰此敘灯明亦於一乘隨宜說三也初中後者指三乘之法皆應機契道無不善也藉權顯實故其義深遠方便隨機故其語巧妙本於一乘故純一無雜明菩薩行故具足清白梵行之相以一乘應三乘而說故云說應四諦等於二乘言求於菩薩不言求者佛為大事出興本說教菩薩法故不待求於餘乘非所願說特因樂小者求而後說也次復有佛亦名日月燈明次復有佛亦名日月燈明如是二萬佛皆同一字號日月燈明又同一姓姓頗羅墮彌勒當知初佛後佛皆同一字名日月燈明十號具足所可說法初中後善其最後佛未出家時有八王子一名有意二名善意三名無量意四名寶意五名增意六名除疑意七名響意八名法意是八王子威德自在各領四天下是諸王子聞父出家得阿耨多羅三藐三菩提悉捨王位亦隨出家發大乘意常修梵行皆為法師已於千萬佛所植諸善本此又引然灯本始以明妙法傳續之由也自初燈明至最後燈明有二萬佛然灯即最後燈明之王子也名字性皆同者明道同也有八王子者聖人示迹表法也依燈明有八意表從妙明真心出妙觀察意其用有八也及南曰智勝王子有珍玩之具聞父得道捨之而徃其意同此心王出三界家則八識之子隨出而為諸法師亦若是矣戒環曰妙心本空而能有用故名有意此妙有也出乎妙心用無不善故名善意此妙善也量不可測名無量意此妙量也對境利用名寶意此妙寶也觸類而長名增意此妙增也善能覺了名除疑意此妙覺也應物如響名響意此妙響也建立萬法名法意此妙法也領四天下者未出家時未免物累也聞父得道捨位出家者離情去累乃趣正覺之表也是時日月灯明佛說大乘經名無量義教菩薩法佛所護念說是經已即於大眾中結加趺坐入於無量義處三昧身心不動彌勒當知爾時會中有二十億菩薩樂欲聽法是諸菩薩見此光明普照佛土得未曾有欲知此光所為因緣時有菩薩名曰妙光有八百弟子是時日月燈明佛從三昧起因妙光菩薩說大乘經名妙法蓮華教菩薩法佛所護念此言昔眾見瑞欲知其緣亦如今眾及南曰妙光即文殊前身昔因妙光而說者為其為世間眼能證此法故今亦因其助發六十小劫不起于座時會聽者亦坐一處六十小劫身心不動聽佛所說謂如食頃是時眾中無有一人若身若心而生懈倦及南曰此言法華三昧真知見力不為頃久推移不為時劫加損故也戒環曰昔眾六十小劫謂如食頃今眾五十小劫謂如半日皆由得法華三昧於道不倦如此日月燈明佛於六十小劫說是經已即於梵魔沙門婆羅門及天人阿修羅眾中而宣此言如來於今日中夜當入無餘涅槃祥邁曰涅槃此云滅度謂滅盡諸苦度生死海真常道果之號非喪亡之號也真常者生靈性名之大本也聖人復還元覺不沉諸妄不受諸變故曰真常與儒所謂復則不妄老所謂復命曰常同意經已唱滅欲付大事故今佛經已亦云不久涅槃欲以妙法付囑有在也有餘無餘者小乘厭生死苦欲速出三界滯於偏真證性未圓故名有餘大乘離生死見無退無出凝然常寂證性已圓故名無餘今云入涅槃者示脫幻妄塵擾而反乎本真凝寂也時有菩薩名曰德藏日月燈明佛即授其記告諸比丘是德藏菩薩次當作佛號曰淨身多陀阿伽度阿羅訶三藐三佛陀佛授記已便於中夜入無餘涅槃祥邁曰多陀阿伽度云如來阿羅訶云應供三藐三佛云正遍正覺略稱十號之三也戒環曰亦如今說經後記諸弟子也佛滅度後妙光菩薩持妙法蓮華經滿八十小劫為人演說日月燈明佛八子皆師妙光妙光教化令其堅固阿耨多羅三藐三菩提是諸王子供養無量百千萬億佛已皆成佛道其最後成佛者名曰然燈及南曰是道出於本覺明心而常資妙光智體傳續不窮如一燈明然百千灯其明不窮其光不二此妙法大本也故援引止此祥邁曰大覺滅度譬薪火者以薪雖窮而火傳不知其盡所謂不滅也戒環曰妙光昔助燈明為然燈之師今助釋迦續燈明之道八子生於燈明師於妙光至其成佛又號然燈而然燈又為釋迦之師八百弟子中有一人號曰求名貪著利養雖復讀誦眾經而不通利多所忘失故號求名是人亦以種諸善根因緣故得值無量百千萬億諸佛供養恭敬尊重讚歎及南曰彌勒初心貪着小乘利養故於眾經唯求名言無所通達忘失正見𫎇灯明教故得值多佛趨補處彌勒當知爾時妙光菩薩豈異人乎我身是也求名菩薩汝身是也今見此瑞與本無異是故惟忖今日如來當說大乘經名妙法蓮華教菩薩法佛所護念祥邁曰引瑞事同今所忖唯此且又廣引三昧唱滅等者意在冥敘一經本末故廣引之事皆契後文戒環曰今昔之事宛然相契則將說法華斷可忖矣方便品第二方便者謂諸法寂滅相不可言說惟方便開示使自得之爾時世尊從三昧安詳而起告舍利弗諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知無量義三昧起也二智一乘之深也諸佛智慧指權實二智也權智說法實智證法其智慧門指一乘妙法也戒環曰經初發緒獨因文殊而出定輙告鶖子者此經以智立體會權歸實文殊為實智之首鶖子為權智第一所以告之之意在引權入實也所以者何佛曾親近百千萬億無數諸佛盡行諸佛無量道法勇猛精進名稱普聞成就甚深未曾有法隨宜所說意趣難解祥邁曰如此深難者將以引權入實也三歸一欲發歎二乘願慕戒環曰釋上智深法深之由也親無數佛則所學之深行無量道則所造之深勇猛精進則建志之深名稱普聞則積德之深成就深法則所證之深隨宜所說則方便之深所以難解難入也舍利弗吾從成佛已來種種因緣種種譬喻廣演言教無數方便引導眾生令離諸著所以者何如來方便知見彼羅蜜皆已具足及南曰世尊出興種種演說方便導生皆由權實二智耳戒環曰方便波羅蜜權智也知見波羅蜜實智也非權不能導生非實不能離著故須兩具也諸著者麤即六塵業細即二乘法舍利弗如來知見廣大深遠無量無礙力無所畏禪定解脫三昧深入無際成就一切未曾有法祥邁曰此歎實智證法盖是智也攝一切法如空包色融一切相如海納流故福廣大深遠戒環曰如來真知見力廣無不容深無不極故四無量心四無礙辯十力四無畏深禪大定諸解脫法諸三昧門一一深造實際凡一切未曾有法無不由此成就舍利弗如來能種種分別巧說諸法言詞柔軟悅可眾心祥邁曰此難權智說法戒環曰如來真方便力能分別萬法巧說三乘曲徇機宣故言詞柔軟稱適物性故悅可眾心舍利弗取要言之無量無邊未曾有法佛悉成就祥邁曰結二智德用也止舍利弗不須復說所以者何佛所成就第一希有難解之法唯佛與佛乃能究盡諸法實相乃南曰如是實相觸事而真擬之即差言之即乖也言諸儒生類无能解者以即諸世諦性相而默得於色心之外為難也戒環曰止之不說益顯深妙也第一難解之法即實相妙法非言所及故不須復說非意所到故希有難解非二乘所造故唯佛能究所謂諸法如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等補註曰舊約四聖六凡十法界而說以一界各具十如合為十界百如攝為百界千如融之以至於無盡此乃即實相而明法性也又作三觀而釋空則是相如假則如是相中則相如是此乃即實相而明觀智也然此正明諸法實相乃一乘極談不應作如如理性釋之況十如三觀方是大乘圓融之法於一乘實相同途異轍達者審之戒環曰上所謂實相者即世間諸法性相體力本末究竟等是也可見為相相本為性形具為體利用為力乍起為作資始為因助因為緣緣熟為果應果為報始終為本末窮盡為究竟一切諸法不離此十亦各具此十也如是者隨事執法之辭謂諸法有如是之相如是之性乃至如是而始終如是而窮盡無非實相也即此而推現前種種松直棘曲鵠白烏黑竹如是翠花如是黃凡即諸世諦之事無非實相也唯其即世諦而無非實相故證之者當不虧其天真不離其當體而默得於色心之外是謂第一希有難解之法也爾時大眾中有諸聲聞漏盡阿羅漢各作是念今者世尊何故殷勤稱歎方便而作是言佛所得法甚深難解有所言說意趣難知一切聲聞辟支佛所不能及佛說一解脫義我等亦得此法到於涅槃而今不知是義所趣及南曰二乘聞佛深難二智而不能解故疑之從而作是言佛說已下皆敘佛前言戒環曰佛說下因佛難解脫諸三昧遂以二乘解脫等佛解脫謂己已得不知二乘但離虗妄名為解脫其實未得一切解脫也爾時舍利弗知四眾心疑自亦未了而白佛言世尊何因何緣殷勤稱歎諸佛第一方便甚深微妙難解之法我自昔來未曾從佛聞如是說今者四眾咸皆有疑惟願世尊敷演斯事爾時佛告舍利弗止止不須復說若說是事一切世間諸天及人皆當驚疑祥邁曰此乃身子發問之詞及南曰佛止不說謂道大機小聞者驚疑舍利弗重白佛言世尊唯願說之惟願說之爾時佛告舍利弗我今此眾無復枝葉純有真實舍利弗如是增上慢人退亦佳矣汝今善聽當為汝說戒環曰佛依小根而止身子依大根而請為法之切如比夫枝葉譬鎻末之眾真實譬成德之眾佛告舍利弗如是妙法諸佛如來時乃說之如優曇鉢華時一現耳及南曰此妙法即佛知見與所謂是法非思量分別所解者盡此矣直可非思量分別而解之戒環曰直指妙法全體也優曇此云靈瑞華三千年一現現則金輪王出譬妙法為一大事時乃說之所以者何我以無數方便種種因緣譬喻言詢演說諸法是法非思量分別之所能解唯有諸佛乃能知之所以者何諸佛世尊唯以一大事因緣故出現於世及南曰一大事即諸佛知見當人妙心萬法實相無二無三故曰一此非小緣故曰大事戒環曰云我以方便演說即明權也云是法非思量所解顯實也所以非思量分別者離識情也唯佛能知非二乘法也一大事者一乘妙法也舍利弗云何名諸佛世尊唯以一大事因緣故出現於世諸佛世尊欲令眾生開佛知見使得清淨故出現於世欲示眾生佛之知見故出現於世欲令眾生悟佛知見故出現於世欲令眾生入佛知見道故出現於世及南曰此真知見生佛等有本來清淨唯人以妄塵所染光明所覆而自迷失故佛與開示使得其本來清淨者而自悟入不復迷失也開者破無明之封蔀示者指所迷之真體悟者豁然洞視入者深造自得而證一切種智是謂佛知見道也戒環曰徵釋上義明諸佛出興本懷也佛知見者徹了實相真知真見也在法名一佛乘在因名一大事在果名一切種智故曰諸佛因一大事故出興為一佛乘故說法欲令眾生開佛知見而究竟皆得一切稱知也舍利弗是為諸佛以一大事因緣故出現於世祥邁曰此結釋也佛告舍利弗諸佛如來但教化菩薩諸有所作常為一事唯以佛之知見示悟眾生舍利弗如來但以一佛乘故為眾生說法無有餘乘若二若三戒環曰諸佛為一大事出現故諸有所作常為一事以此而教菩薩以此而示眾生以此而諸說法曾無他道也舍利弗一切十方諸佛法亦如是及南曰此言十方道同也戒環曰亦莫不由斯道也舍利弗過去諸佛以無量無數方便種種因緣譬喻言詞而為眾生演說諸法是法皆為一佛乘故是諸眾生從諸佛聞法究竟皆得一切種智舍利弗未來諸佛當出於世亦以無量無數方便種種因緣譬喻言詞而為眾生演說諸法是法皆為一佛乘故是諸眾生從佛聞法究竟皆得一切種智舍利弗現在十方無量百千萬億佛土中諸佛世尊多所饒益安樂眾生是諸佛亦以無量無數方便種種因緣譬喻言詞而為種生演說諸法是法皆為一佛乘故是諸眾生從佛聞法究竟皆得一切種智戒環曰雖說百千億無數諸法門其實為一乘一切種智即佛果智也及南曰言說雖三究竟則一舍利弗是諸佛但教化菩薩欲以佛之知見示眾生故欲以佛之知見悟眾生故令眾生入佛之知見故戒環曰結指歸同也不言開者云教化即開義舍利弗我今亦復如是知諸眾生有種種欲深心所著隨其本性以種種因緣譬喻言詞方便力而為說法舍利弗如此皆為得一佛乘一切種智故戒環曰此言自行道同謂我今說法皆式諸佛種種欲着或依濁業欲五塵着愛染或依淨業欲小果着二乘舍利弗十方世界中尚無二乘何況有三及南曰此結顯一乘也舍利弗諸佛出於五濁惡世所謂劫濁煩惱濁眾生濁見濁命濁如是舍利弗劫濁亂時眾生垢重慳貪嫉妬成就諸不善根故諸佛以方使力於一佛乘分別說三祥邁曰此言聖人始以乘時濟道不得已而說三然要其終實為一乘耳堅着五欲癡愛生惱煩惱濁以欲因緣墜三惡輪六趣眾生濁受胎微形增長眾苦命濁入邪見林着妄諂曲見濁具足六十二見於萬億劫不聞佛名不聞正法劫濁戒環曰五濁皆依性說性本淵澄五事交擾起諸塵滓名濁所謂劫濁者劫言時也時多惡事混濁起業煩惱濁者開即九十八使總即貪嗔痴等五鈍混濁障事眾生濁者長養無明支離六道眾惡相生混濁障性見濁者開即六十二見總即身邊等五利混濁障理命濁者業識為種交遘發生隨劫短減汩沒生死劫濁無別體但依四者增劇立名譬喻品第三譬喻者上知已悟中根未解故引三車一門之淺以況三乘一道之深所喻有九謂火宅窮子藥草化城繫珠鑿井王髻父少醫師今遺二矣爾時舍利弗踊躍歡喜而白佛言世尊我常獨處山林樹下若坐若行每作是念我等同入性法云何如來以小乘法而見濟度是我等咎非世尊也戒環曰居常推尅聞同記異非佛所私咎實在我同入法性謂同證真理所以者何若我等待說所因成就阿耨多羅三藐三菩提者必以大乘而得度脫然我等不解方便隨宜所說初聞佛法遇便信受思惟取證戒環曰釋自咎也所因即實智為菩提正因佛固將說我不欵待初聞四諦即便信受速取小果盖自誤也世尊我從昔來終日竟夜每自尅責而今從佛聞所未聞未曾有法斷諸疑悔身意泰然快得安隱今日乃知真是佛子從佛口生從法化生得佛法分戒環曰自慶所悟也口生者因聞一音法生者悟如是法法分者得如來知見寶藏之分也爾時佛告舍利弗吾今於天人沙門婆羅門等大眾中說我昔曾於二萬億佛所為無上道故常教化汝汝亦長夜隨我受學我以方便引導汝故生我法中戒經云舍利弗曾於十六劫修菩薩道今云二萬億佛所指彼時也長夜隨學言正智未明戒環曰述其本因以明領悟得記之由也言於天人眾中說者將明遠因遠記示不妄也舍利弗我昔教汝志願佛道汝今悉忘而便自謂已得滅度我今還欲令汝憶念本願所行道故為諸聲聞說是大乘經名妙法蓮華教菩薩法佛所護念戒環曰昔已繫珠今復示珠舍利弗汝於未來世過無量無邊不可思議劫供養若干千萬億佛奉持正法具足菩薩所行之道當得作佛號曰華光如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊及南曰小乘雖悟實智未修大行故須經劫供佛所以廓其大心成就萬德萬德圓備乃成十號具足之佛非自性天真之佛比矣若此頓教所謂過無量不思議劫者直約正智頓斷無明頓圓種智則無邊劫迷一時頓滅是謂過無邊不成佛戒環曰既悟妙法當成佛道故得記作佛也諸授記文皆二初供佛行道因記也次十號劫國果記也此記大因大果以䇿進小乘也號華光者華表因行光能發明由最初領悟發明是道故也既受佛記猶過多劫然後得果者成佛由智得果由行也國名離垢其土平正清淨嚴飾安隱豐樂天人熾甚琉璃為地有八交道黃金為繩以界其側其傍各有七寶行樹常有華果華光如來亦以三乘教化眾生舍利弗彼佛出時雖非惡世以本願故說三乘法其劫名大寶莊嚴何故名曰大寶莊嚴其國中以菩薩為大寶故及南曰反而求之離垢清淨之相皆即心地安隱豐樂之事無非德性染注轉變常存乎人使眾生不為堪忍苦不起三濁業不行邪諂行則真離垢平正安穩豐樂之國矣戒環曰劫國莊嚴皆因行依報也鶖子因行以大智為本故國名離垢因行發明教菩薩法故劫名大寶莊嚴而以菩薩為大寶清淨嚴飾則無諸穢土安隱豐樂則無三災苦天人熾甚則無三惡道有八交道等者八正道之所會也七寶行樹等者七覺支之所生也凡諸佛依報皆然葢因行所同也若眾生依報則國名堪忍劫名五濁其土坑坎沙礫為地亦因行所同也彼諸菩薩無量無邊不可思議筭數譬喻所不能及非佛智力無能知者若欲行時寶華承足此諸菩薩非初發意皆久植德本於無量百千萬億佛所淨修梵行恒為諸佛之所稱歎常修佛慧真大神通善知一切諸法之門質直無偽志念堅固如是菩薩充滿其國舍利弗華光佛壽十二小劫除為王子未作佛時其國人民壽八小劫戒環曰除為王子時獨記作佛後壽十二劫華光如來過十二小劫授堅滿菩薩阿耨多羅三藐二菩提記告諸比丘是堅滿菩薩次當作佛號曰華足安行多陀阿伽度阿羅呵三藐三佛陀其佛國土亦復如是此身子轉記堅滿使傳續妙道也及南曰抑記號華足安行取其帶果行因也菩薩寶華承足取其藉因得界也戒環曰過十二小劫即臨滅時也法華妙道本於燈明傳於妙光繼於然燈佛佛手授光光相續故身子得之而記號華光盖發明是道使有目者共覩也堅滿得之又號華足安行則率循是道使有趾者共由也至於其國菩薩行則寶華承足則從其化者莫不由是道也爾時四部大眾見舍利弗於佛前受阿耨多羅三藐三菩提記心大歡喜踊躍無量各各脫身所著上衣以供養佛釋提桓因梵天王等與無數天子亦以天妙衣天曼陀羅花摩訶曼陀羅華等供養於佛所散天衣住虗空中而自迴轉諸天伎樂百千萬種於虗空中一時俱作雨眾天花戒環曰踊喜以謂我等亦如是必當得作佛諸天因聞妙法得離性障遂廻小向大是以脫衣供佛以籍其誠表解天弢隳天袠也衣住空中而自廻轉乃廻向精誠所感也戒環曰衣服人之弢袠也性障天之弢袠也迴轉即迴向意也而作是言佛昔於波羅奈初轉法輪今乃復上無上最大法輪戒環曰此言昔轉四諦為最小今轉一乘為最大爾時舍利弗白佛言是諸千二百心自在者昔住學地佛常教化言我法能離生老病死究竟涅槃是學無學人亦各自已離我見及有無見等謂得涅槃而今於世尊前聞所未聞皆墮疑惑善哉世尊願為四眾說其因緣令離疑惑戒環曰心自在即無學羅漢學無學即小聲聞昔𫎇佛教自謂究竟而息見趣寂今聞雖說涅槃亦非真滅是以疑惑也爾時佛告舍利弗若國邑聚落有大長者其年衰邁財賦無量多有田宅及諸僮僕及南曰引起火宅之喻明昔權教皆為化迷也祥邁曰此譬佛王化三界也戒環曰國有邑邑有聚落譬大千有三界三界有六道四生大長者譬如來為一切世間之父其年衰邁譬應緣已久欲般涅槃也財賦無量譬無量知見之法財多有田宅譬方便智慧之福田僮僕譬慈悲無倦以佑助正道從事群機其家廣大唯有一門多諸人眾一百二百乃至五百人止住其中及南曰此言家廣人眾譬五趣苦聚也戒環曰家譬一界一門譬一乘出離之道五百人譬五趣眾生言一百二百者自人天次第而數也堂閣朽故墻壁隤落柱根腐敗梁棟傾危周帀俱時欻然火起焚燒舍宅及南曰此言宅弊火逼譬身老苦逼也戒環曰家有堂閣宅舍舍宅有墻壁柱根梁棟皆朽腐將傾而不可居譬三界有五陰眾生眾生有四大命根支體皆變異速壞而不可保然且於中競造惡業為五欲財利生死悲惱之所燒煑天上人間無能免者故曰周帀俱時欻然火起長者諸子若十二十或至三十在此宅中及南曰前於五趣言百此於三乘言十者以五趣眾生從三乘之化者十一而已戒環曰言五百人又言諸子者人則汎舉群生子則特舉從化者若十指菩薩子二十三十指二乘長者見是大火從四面起即大驚怖而作是念我雖能於此所燒之門安隱得出而諸子等於火宅內樂著嬉戲不覺不知不驚不怖火來逼身苦痛切己心不厭患無求出意及南曰此言長者救譬觀六道苦起大悲心眾生徒見得忘形見利忘真火宅之人皆如是也戒環曰四面即眾生老病死四相為眾苦之本所燒之門安隱得出譬佛於生死苦永盡憂患不能襲也諸子樂著不覺不怖譬身著世樂無有慧心舍利弗是長者作是思惟我身手有力當以衣裓若以几案從舍出之復更思惟是舍惟有一門而復狹小及南曰沉思救焚之方也謂將恃身手有力顯幼稚之微欲以衣裓密扶而出之身以几案憑挈而出之又思其門狹小不可用此但以殷勤方便引而出之也三藏法師云衣裓者西國盛華之具貢上貴人用之戒環曰此譬三七思惟設教之意身手全體譬如來知見力無所畏衣裓密用譬有大神力几案可憑譬智慧力其門狹小譬二乘心劣不堪此法故後文云若我但以神力及智慧力讚如來知見力無所畏者眾生不能以是得度故但以方便拔濟之也諸子幼稚未有所識戀著戲處或當墮落為火所燒我當為說怖畏之事此舍已燒宜時疾出無令為火之所燒害作是念已如所思惟具告諸子汝等速出父雖憐愍善言誘喻而諸子等染著嬉戲不肯信受不驚不畏了無出心亦復不知何者是火何者為舍云何為失但東西走戲是父而已戒環曰憂其無知明告其害使知趍利戒環曰此言諸子癡迷譬眾生為貪欲所迷雖遭大苦不以為患及南曰耽湎既甚不知何者是苦何者是身云何為貧但迷己逐物火馳不返雖值佛法不從其化特視之而已爾時長者即作是念此舍已為大火所燒我及諸子若不時出必為所焚我今當設方便令諸子等得免斯害父知諸子先心各有所好種種珍玩奇異之物情必樂著而告之言汝等所可玩好希有難得汝若不取後必憂悔如此種種羊車鹿車牛車今在門外可以遊戲汝等於此火宅宜速出來隨汝所欲皆當與汝及南曰徒令速出則拂其所欲既不能化故順其所欲而化行簡子曰聲聞乘為羊車辟支乘為鹿車大乘為牛車祥邁曰羊鹿非可服乘徒為玩好之具如二乘不足致道徒為戲論之法而已戒環曰長者亦自恐被焚者譬佛示身三戒與民同患也知子所好者譬知諸眾生有種種憂隨其本性方便說三也車表果法不屬三界故云今在門外可以遊戲者喻法樂可以自娛也牛正服乘之大力者正譬大根以任大乘羊鹿非可服乘徒以像牛為幼稚玩好之具權譬小根以任小乘爾時諸子聞父所說珍玩之物適其願故心各勇銳互相推排競共馳走爭出火宅及南曰此言諸子出宅譬適其欲故化無不從戒環曰進之為推退之為排此爭出之勢也譬隨根利鈍決擇三乘以求出離是時長者見諸子等安隱得出皆於四衢道中露地而坐無復障礙其心泰然歡喜踊躍及南曰乍喜諸子脫苦也同衢露坐等譬依四諦造偏空而不知進也時諸子等各白父言父先所許玩好之具羊車鹿車牛車願時賜與戒環曰諸子出宅就父索車譬因獲三乘之利遂執三乘之果舍利弗爾時長者各賜諸子等一大車其車高廣眾寶莊校周帀欄楯四面懸鈴又於其上張設幰盖亦以珍奇雜寶而嚴飾之寶繩交絡垂諸華瓔重敷婉筵安置丹枕駕以白牛膚色充潔形體姝好有大筋力行步平正其疾如風又多僕從而侍衛之及南曰譬說三之後等示一乘使知無二無三即廢權立實也惣而譬之即後所謂諸佛禪定解脫等娛樂之具一相一種淨妙之樂也戒環曰車譬一乘牛譬大根也表一乘大根之德用也其事高廣者高出三乘廣攝九步也眾寶譬萬行欄楯譬總持懸鈴譬四辯之下化幰盖譬慈悲之普覆雜寶譬眾善所以嚴慈悲也寶繩譬四誓所以固慈悲也垂諸華瓔則外布妙因聯續如瓔重敷婉筵則內弘忍力柔軟如筵安置丹枕者使心宜覺觀而默處是道也駕以白牛者非純一大根不堪此乘也膚色充潔得其所養而無染也形體姝好全其所賦而無惡也有大筋力譬堪任大事行步平正譬𠃔蹈大方其疾如風譬一念頓造又多僕從譬方便利生助道之事所以者何是大長者財富無量種種諸藏悉皆充溢而作是念我財物無極不應以下劣小車與諸子等及南曰釋所以賜等一大車之意戒環曰譬如來有無量知見力無所畏諸佛法藏能與眾生大乘之去今此幼童皆是吾子愛無偏黨我有如是七寶大車其數無量應當等心各各與之不宜差別戒環曰譬諸眾生皆是我子等與大乘不令有人獨得滅度所以者何以我此物周給一國猶尚不匱何況諸子戒環曰萬物皆徃資焉而不匱此之謂也是時諸子各乘大車得未曾有非本所望戒環曰譬二乘得佛過其所望舍利弗於汝意云何是長者等與諸子珍寶大車寧有虗妄不戒環曰問許三而賜一猶始權而終實始終相違涉虗妄不舍利弗言不也世尊是長者但令諸子得免火難全其軀命非為虗妄何以故若全身命便為已得玩好之具況後方便於彼火宅而拔濟之戒環曰身為道本本全則道全所以至人常遺物抱道以全身養生而火宅之人唯物之玩不自貴愛故此警之耳戒環曰以全身命為得玩好者身之可玩固甚於物世尊若是長者乃至不與最小一車猶不虗妄何以故是長者先作是意我以方便令子得出以是因緣無虗妄也何況長者自知財富無量欲饒益諸子等與大車佛告舍利弗善哉善哉如汝所言戒環曰此結不妄之意舍利弗如來亦復如是則為一切世間之父於諸怖畏衰惱憂患無明暗蔽永盡無餘戒環曰視四生如一子等三界以同仁戒環曰怖畏惱患即三戒苦相無明暗蔽即四生苦本於此永盡即如如佛而悉成就無量知見力無所畏有大神力及智慧力具足方便智慧波羅蜜大慈大悲常無懈倦恒求善事利益一切戒環曰知見力無畏正智也方便智度權智也神力智力所以資正智慈悲無倦所以運權智而生三界朽故火宅為度眾生生老病死憂悲苦惱愚癡暗蔽三毒之火教化令得阿耨多羅三藐三菩提見諸眾生為生老病死憂悲苦惱之所燒煑亦以五欲財利故受種種苦又以貪著追求故現受眾苦貧窮困苦愛別離苦冤憎會苦如是等種種諸苦眾生沒在其中歡喜遊戲不覺不知不驚不怖亦不生猒不求解脫於此三界火宅東西馳走雖遭大苦不以為患戒環曰而生下言由慈悲故示生三界之家濟度五趣之眾以自永盡無明暗蔽故欲度眾生愚癡暗蔽以自成就無量知見故欲令眾生得大菩提所謂欲令一切眾如我等無異也見諸眾生下俻舉三界火毛苦狀該三世六道因果也戒環曰苦惱為果業屬前因五欲財利追求等苦為因業屬後果貧窮等苦即緣上因果成六道業化為異類淪替不停實可驚怖彼且喜而不猒遭而不患實癡暗所蔽也舍利弗佛見此已便作是念我為眾生之父應拔其苦難與無量無邊佛智慧樂令其遊戲舍利弗如來復作是念若我但以神力及智慧力舍於方便為諸眾生讚如來知見力無所畏者眾生不能以是得度戒環曰無邊佛慧樂即一乘法樂如來知見力無所畏即一乘法體雖足以苦然非凡夫事故不能以是得度所以者何是諸眾生未免生老病死憂悲苦惱而為三界火宅所燒何由能解佛之智慧戒環曰所以不能以是得度者為眾苦所迷故舍利弗如彼長者雖復身手有力而不用之但以殷勤方便勉濟諸子火宅之難然後各與珍寶大車如來亦復如是雖有力無所畏而不用之但以智慧方便於三界火宅拔濟眾生為說三乘聲聞辟支佛佛乘而作是言汝等莫得樂住三界火宅勿貪麤弊色聲香味觸也若貪著生愛則為所燒戒環曰此言善誘論力其苦也色等五欲俗以為軟美偏以為弊為皆幻惑濁惡能發業苦實致火之具也故貪着生愛則為所燒汝速出三界當得三乘聲聞辟支佛佛乘我今為汝保任此事終不虗也汝等但當勤修精進如來以是方便誘進眾生復作是言汝等當知此三乘法皆是聖所稱歎自在無繫無所依求乘是三乘以無漏根力覺道禪定解脫三昧等而自娛樂便得無量安隱快樂此三乘法聖所稱歎者諸佛共尊也能離生死故自在無繫異有為法故無所依求得是乘者斯得無漏五根五力七覺支八正道四禪九次第定八解脫諸三昧法足以娛樂脫三界苦戒環曰示以三乘而讚其法使向慕也舍利弗若有眾生內有智性從佛世尊聞法信受殷勤精進欲速出三界自求涅槃是名聲聞乘如彼諸子為求羊車出於火宅此言初聲聞乘戒環曰此辨三乘根性不等取果有異如彼諸子玩好不同戒環曰內有智性者謂正因信種揀非闡提也內有是因故從佛為緣觀四諦理聞聲悞道名聲聞乘欲速機小故譬羊車若有眾生從佛世尊聞法信受殷勤精進求自然慧樂獨善寂深知諸法因緣是名辟支佛乘如彼諸子為求鹿車出於火宅及南曰此言緣覺乘此乘斷三界見思與聲聞同更侵斷習氣根性猛利故居聲聞上其機稍大故譬鹿車戒環曰辟支此云獨覺亦通緣覺出無佛世觀物變易自覺無生故號獨覺觀十二緣覺真諦理故號緣覺求自然慧樂獨善寂即獨覺也深知諸法因緣即緣覺也若有眾生從佛世尊聞法信受勤修精進求一切智佛智自然智無師智如來知見力無所畏愍念安樂無量眾生利益天人度脫一切是名大乘菩薩求此乘故名為摩訶薩如彼諸子為求牛車出於火宅及南曰此言菩薩乘此兼三乘集眾智之大根也其機為最故譬牛車戒環曰一切智即菩薩智也佛智即一切種智也自然即離諸證取者無師即不由他悟者能求眾智及如來知見廣大德用而愍安利度所以為大菩薩舍利弗如彼長者見諸子等安穩得出火宅到無畏處自惟財富無量等以大車而賜諸子此牒見子得出露地而坐自念財物無極不與小車等文次合如來亦復如是為一切眾生之父若見無量億千眾生以佛教門出三界苦怖畏險道得涅槃樂如來爾時便作是念我有無量無邊智慧力無畏等諸佛法藏是諸眾生皆是我子等與大乘不令有人獨得滅度皆以如來滅度而滅度之及南曰合上可明出三界苦得涅槃樂即權乘小果如來滅度而滅度之即大乘極果是諸眾生脫三界者悉與諸佛禪定解脫等娛樂之具皆是一相一種聖所稱歎能生淨妙第一之樂舍利弗如彼長者初以三車誘引諸子然後但與大車寶物莊嚴安隱第一然彼長者無虗妄之咎如來亦復如是無有虗妄初說三乘引導眾生然後但以大乘而度脫之何以故如來有無量智慧力無所畏諸法之藏能與一切眾生大乘之法但不能盡受舍利弗以是因緣當知諸佛方便力故於一佛乘分別說三戒環曰是諸眾生下䟽上等與大乘之意也謂彼脫三界者雖得小乘禪定解脫然猶厭有着空非一相也裂為二乘非一種也執着未除非淨也空有未融非妙也故與之諸佛禪定解脫娛樂之具一相一種淨妙之樂如彼大車眾美具備舍利弗下總結前文也不能盡受者機不齊故信解品第四信解者因間窮說以信得入悟解法要也爾時慧命須菩提摩訶迦旃延摩訶迦葉摩訶目犍連從佛所聞未曾有法世尊授舍利弗阿耨多羅三藐三菩提記發希有心歡喜踊躍及南云湏菩提解空第一而聲聞但念偏空於菩薩法心不喜樂今乃捨空法證實道故以解空人表敘戒環曰須菩提年德高眾故稱長老或曰具壽或曰慧命或經云是人佛法中能得智慧命是也合先列大迦葉而先須菩提者亦當機故也世尊往昔說法既久我時在座身體疲懈但念空無相無作於菩薩法遊戲神通淨佛國土成就眾生心不喜樂智者謂依四諦以觀諸法無我我所名空以空故萬法一異等相實不可得名無相知一切法無相不可得即於三界無所願求不復造作三有生死之業名無作亦名無願戒環曰說法既久指四十年說小教時也以疲懈故但念小乘空法不復求進也空無相無作即小乘三解脫門也菩薩法即大乘法也遊戲神通等即大乘行也彼唯樂小沈空趣寂故於大法大行心不喜樂所以者何世尊令我等出於三界得涅槃證又令我等年已朽邁於佛教化菩薩阿耨多羅三藐三菩提不生一念好樂之心戒環曰釋上之失為滯小故我等今於佛前聞授聲聞阿耨多羅三藐三菩提記心甚歡喜得未聞有不謂於今忽然得聞希有之法深自慶幸獲大善利無量珍寶不自求得及南曰此乃慶今所得也世尊我等今者樂說譬喻以明斯義譬若有人年既幼稚捨父逃逝久住他國或十二十至五十歲行簡子曰南華亦謂弱喪正是此說戒環曰幼稚譬專蒙無知捨父譬棄背本覺他國譬淪滯五道故曰至五十歲或十二十譬次第而淪也年既長大加復窮困馳騁四方以求衣食漸漸遊行遇向本國及南曰遇向直方向之且未能至也戒環曰年長窮困四方求食譬困五道歷四生以自活命漸向本國譬因遇佛教遂能反省其父先來求子不得中止一城其家大富財寶無量金銀琉璃珊瑚琥珀頗梨珠等其諸倉庫委皆盈溢多有僮僕臣佐吏民象馬車乘牛羊無數出入息利乃遍他國商估賈客亦甚眾多及南曰倉盈法喜之食庫溢諸法之財僮僕所以自奉臣佐所以治民譬自利利他事也象馬牛羊以譬五乘教授商以迁有資無賈以覆藏待價商估猶商人也戒環曰其父譬覺皇也先求不得譬昔曾教化後還退墮也中止一城譬華嚴法菩提場其家大富財寶諸珍譬道場所得法具無量功德也倉庫僮僕等譬滋息廣被大千故曰出入息利乃遍他國由是群生咸求法利故曰商賈眾多總譬出興利澤也時貧窮子遊諸聚落經歷國邑遂到其父所止之城及南曰此節意謂在昔迷淪因教漸引遂入正道也戒環曰窮子譬困於五道從功德財聚落荒淺譬小乘權教國邑盛麗譬中乘漸教其父所止譬大乘正教父每念子與子離別五十餘年而未曾向人說如此事但自思惟心懷悔恨自念老朽多有財物金銀珍寶倉庫盈溢無有子息一旦終歿財物散失無所委付是以殷勤每憶其子復作是念我若得子委付財物坦然快樂無復憂慮戒環曰父每念子等者譬佛念二乘之子久淪五道性習昏淺未堪說大也思惟悔恨者悔昔之教未深恨今之機退失也自念老朽等者憂其無以續佛壽命也世尊爾時窮子傭賃展轉遇到父舍住立門側補註曰為人之用曰傭任力取利曰賃城譬乍入舍譬深入謂資籍權乘積漸深造也戒環曰傭賃而作徒取小利功非己有譬資籍權教終無實證也到舍而住立門側譬雖值佛道不能正入猶依偏空而止為樂小故遙見其父踞師子床寶几承足諸婆羅門剎利居士皆恭敬圍繞以珍珠瓔珞價直千萬莊嚴其身吏民僮僕手執白拂侍立左右覆以寶帳垂諸華幡香水洒地散眾名華羅列寶物出內與取有如是等種種嚴飾威德特尊窮子見父有大力勢即懷恐怖悔來至此竊作是命此非是王或是王等非我傭力得物之處不如往至貧里肆力有地衣食易得若久住此或見逼迫強使我作作是念已疾走而去祥邁曰此譬二乘初聞佛果萬德種智之事而迷小怖及南曰內音納或出或納也及南曰威德特尊以上皆萬德種智之事自窮子見父已下即迷小怖大之事行簡子曰若修大乘必入生死廣學萬行故言逼迫補註曰拂能去塵白言不染左右表拂去空假之塵而歸中道也戒環曰遙見其父譬未能親證踞師子床者表無畏之德也寶几承足者尊萬行之本也萬行本真而能涉俗故剎利居士皆悉圍繞二乘不能涉俗矣因萬行以成萬德故以真珠瓔珞莊嚴其身二乘無此莊嚴矣吏所以治民所以役僮任輕僕任重譬一乘法中所治所役輕重纖悉之法無不俻者所謂治世語言資生業等皆順正法但以不染不偏為尚故執白拂侍左右寶帳譬慈悲廣被故言覆華幡譬眾善下化故言垂水譬智華譬因香水洒地者以妙智淨眾生心地也散眾名華者以妙因嚴眾生心地也羅列寶物所以示其玩好出內取與所以隨其欲樂譬成就大根而誘進小乘也王謂國王王等謂王之族譬法報二身也貧居里巷譬二乘小道肆力有地譬進修有方非得物處譬大法難乘衣食易得譬小果易求或見逼迫譬慮佛道長久久受勤苦時富長者於師子座見子便識心大歡喜即作是念我財物庫藏今有所付我常思念此子無由見之而忽自來甚適我願我雖年朽猶故貪惜即遣傍人急追將還見子便識譬昔緣已熟財物有付譬法有授年朽猶故貪惜譬曠劫所修不妄與也遣人急追譬令菩薩說頓法爾時使者疾走往捉窮子警愕稱怨大喚我不相犯何為見捉使者執之愈急強牽將還于時窮子自念無罪而被囚執此必定死轉更惶怖問絕躃地補註曰父命追子實欲親之而子驚悶絕乃自棄也譬二乘初聞華嚴怯其頓說盖頓教以煩惱即菩提而二乘以煩惱為冤賊故稱怨也頓以生死即涅槃而二乘以生死為苦縛故大嘆戒環曰不犯而被捉譬不求而強化急執而強牽譬不從而強牽也菩薩示生三界而一乘以三界為牢獄故云無罪被囚菩薩出入塵勞而一乘恐喪定果故云此必定死由是如聾若啞悶然不解故曰轉更惶怖悶絕躃地父遙見之而語使言不須此人勿強將來以冷水灑面令得醒窹莫復與語戒環曰見其驚急悶絕令姑息之譬捨頓開權也冷水能蘇悶絕譬權教能治煩惱所以者何父知其子志意下劣自知豪貴為子所難審知是子而以方便不語他人云是我子使者語之我今放汝隨意所趣窮子歡喜得未曾有從地而起往至貧臣以求衣食祥邁曰此譬知其志劣難堪大乘故權息之也不云我子未即顯實也戒環曰使者放之譬捨頓也隨意所趣譬開權也從地而起即從迷而覺也往至貧里以求衣食即依二乘貧所樂法為入道資粮也爾時長者將欲誘引其子而設方便密遣二人形色憔悴無威德者汝可詣彼徐語窮子此有作處倍與汝直窮子若許將來使作若言欲何所若便可語之雇汝除糞我等二人亦共汝作時二使人即求窮子既已得之具陳上事祥邁曰此先敘設權也及南曰除糞譬斷煩惱煩惱惑業糞穢心地二乘作諸觀以除之菩薩煩惱涅槃相相留礙而云亦共汝作者以同事攝也行簡子曰但息一切人當求是名除糞秪如今求佛求菩提是名運糞入不名運糞出戒環曰密遺二人者使秘菩薩行者示二乘法也形色憔悴即所謂隱其自在之力倍與汝直譬因樂小而示近果也顧汝除糞即所謂以貧所樂法度之具陳上事譬順佛揚化爾時窮子先取其價尋與除糞其父見子愍而怪之又以他日於窓牖中遙見子身羸瘦憔悴糞土塵坌污穢不淨即脫瓔珞細軟上服嚴飾之具更著麤弊垢膩之衣塵土坌身右手執持除糞之器狀有所畏語諸作人汝等勤作勿得懈息以方便故得近其子補註曰瘦悴塵坌譬二乘伏斷煩惱不得其要翻為煩惱所擾也左逆右順右手執器譬順方便道而誘之戒環曰先取其價譬樂小慕果然後修因所以四諦法中先果後因也其父愍怪其樂小棄大也又以他日於窓牖中等譬又多設方便循其小兒潛施密化使令慕大也後復告言咄男子汝常此作勿復餘去當加汝價諸有所須盆噐米麵鹽醋之屬莫自疑難亦有老弊使人須者相給好自安意我如汝父勿復憂慮及南曰此乃方便叱省而親厚之使安而無怯也戒環曰當加汝價譬自預流而進四果盆噐譬助道等法米麵譬資粮等法鹽醋所以和味使於諸法均調適中也老弊使人譬二乘已陳之法如所謂已陳芻狗也所以者何我年老大而汝少壯汝常作時無有欺怠瞋恨怨言都不見汝有此諸惡如餘作人自今已後如所生子即時長者更與作字名之為兒祥邁曰貶己衰老褒子心力譬斥大褒小權進其功兒憐愛之稱戒環曰言自今如子等者益親厚而進之也更與作字譬改預流而進後果上皆譬設權爾時窮子雖欣此遇猶故自謂客作賤人由是之故於二十年中常令除糞及南曰正譬滯權也戒環曰謂雖欣佛化而志尚卑劣今且令於二乘法中斷除十使煩惱之糞也過是已後心相體信入處無難然其所止猶在本處窮子過二十年久漸親父而猶住門側譬依二乘教斷結之後聞方等教戒環曰揚大而不謗折小而不疑是謂心相體信也進可語大退不滯小是謂入出無難也猶在本處譬未能頓入世尊爾時長者有疾自知將死不久語窮子言我今多有金銀珍寶倉庫盈溢其中多少所應與取悉汝知之我心如是當體此意及南曰此令轉教菩薩之譬也大般若告湏菩提云汝當為菩薩說般若下文云我等又因如來智慧為諸菩薩開演即轉教事戒環曰譬如說般若漸引入實也長者有疾譬方等之後名相未遣人多法執之病佛亦病之將死而語寶藏譬化緣將畢故說般若為法華先導如方語之寶藏未即付也般若教中六度萬行具備故譬倉庫盈溢然未為圓教故其中寶物又有多少或取以自利或與以利他聖人之用心如是宜當體法所以者何今我與汝更為不異宜加用心令無漏失及南曰和同父子之情使無疑間而欣領寶藏也戒環曰我汝不異等譬般若之理一切皆如無二無別是入圓頓之門故宜加用心爾時窮子即受教勅領知眾物金銀珍寶及諸庫藏而無希取一飡之意然其所止故在本處下劣之心亦未能捨及南曰既領寶藏而略不希取譬受敕以大乘轉教而自於此无有志願也戒環曰下劣之心亦未能捨譬但念空無相無作而已上總喻昔失復經少時父知子意漸已通泰成就大志自鄙先心臨欲終時而命其子并會親族國王大臣剎利居士皆悉已集即自宣言諸君當知此是我子我之所生於某城中捨吾逃走跉俜辛苦五十餘年其本字某我名某甲昔在本城懷憂推覔忽於此間遇會得之此實我子我實其父今我所有一切財物皆是子有先所出內是子所知祥邁曰自我求之本始之覺真父子德性之用真寶藏生而固有誰獨具無柰何自失於背馳自迷於勿乎故佛慈憂慮急使退復倘能心相体性斯可遇會得之曾無難者彼且驚愕而失己稱怨以疑佛設作真慈多方善誘終則跉俜窮困於四生五道可為長嘆矣戒環曰子志既大父乃聚族始定父子全付家業也復經少時等譬般若之後大機已熟可一變而至道也自鄙先心譬捨小趣大臨欲終時命子會族如化城云如來自知涅槃時到便集菩薩聲聞為說是經則聲聞為子菩薩為族也聚族宣言此是我子即於天人眾中說我昔曾化故往我法中之譬也於某城中捨吾等者自昔之後汝今悉忘之譬也盖彼時根性未定後還退墮流浪五道故曰跉俜辛苦五十餘年其本字某等者指本名字以證父子之的也其本字某即化城云爾時所化之眾汝等比丘聲聞弟子是也我名某甲即第十六我釋迦是也本城推覔此間遇會譬昔依本性闡化至此頓門乃適然契會也此實我子等結上的證全付家業譬授記作佛紹法王位也我有財物皆是子有者此一大事人人本具不從外得也先所出納是子所知者即平常運用見聞之法非今別有也世尊是時窮子聞父此言即大歡喜得未曾有而作是念我本無心有所悕求今此寶藏自然而至戒環曰結喻今得也世尊大富長者則是如來我等皆似佛子如來常說我等為子戒環曰須菩提真佛子為合譬故言似世尊我等以三苦故於生死中受諸熱惱迷惑無知樂著小法今日世尊令我等思惟蠲除諸法戲論之糞我等於中勤加精進得至涅槃一日之價既得此已心大歡喜自以為足便自謂言於佛法中勤精進故所得弘多然世尊先知我等心著弊欲樂於小法便見縱捨不為分別汝等當有如來知見寶藏之分及南曰三苦者一苦苦若根若境乖違逼迫生老病死諸現苦相二壞苦因樂變異生諸憂惱所謂樂未畢哀又繼之即愛別離求不得之類三行苦即念念遷謝之相五趣蘊苦皆行苦攝一戒環曰敘滯權也云今日者對多生言謂多生樂小而今猶濡滯也於一切法妄起惑染顛倒分別種種戲論糞污心地名戲論糞一日之價譬小果之利所獲不多世尊以方便力說如來智慧我等從佛得涅槃一日之價以為大得於此大乘無有志求戒環曰說如來智慧即般若教我等又因如來智慧為諸菩薩開示演說而自於此無有志願所以者何佛知我等心樂小法以方便隨力我等說而我等不知真是佛子戒環曰此以般若轉教菩薩而自不希水也今我等方知世尊於佛智慧無所恡惜所以者何我等昔來真是佛子而但樂小法若我等有樂大之心佛則為我說大乘法今得法華始知般若之時已欲全付但以樂小自迷若我樂大則全付久矣於此經中唯說一乘而昔於菩薩前毀呰聲聞樂小法者然佛實以大乘教化觀今說一視昔彈偏足知佛心本以大化是故我等說本無心有所希求今法王大寶自然而至如佛子所應得者皆已得之戒環曰結度今得也佛子所應得者一乘修證之法也藥草喻品第五此品中為根沐成頓悟之意三乘根性辟諸草木覺皇道化等如一雨雨雖一味而種有差別故根莖大小之不同法雖一相而機有利鈍故道果證趣之各異爾時世尊告摩訶迦葉及諸大弟子善哉善哉迦葉善說如來真實功德誠如所言戒環曰迦葉領悟喻說即設大富長者之喻歎佛隱勝現劣誘諸庸鄙使得大法利是善說如來真實功德迦葉當知如來是諸法之王若有所說皆不虗也如來觀知一切諸法之所歸趣亦知一切眾生深心所行通達無礙又於諸法究盡明了示諸眾生一切智慧祥邁曰不知法之歸趣難以度心不知心之所行難以說法今於二者通達無礙可謂真知冥化矣戒環曰諸法歸趣即一乘實相眾心所行即三乘性欲佛說一切法為度一切心而又究明諸法以開示眾生一切智慧欲令悟入皆所謂無邊僧祇功德也迦葉譬如三千大千世界山川谿谷土地所生卉木叢林及諸藥草種類若干名色各異祥邁曰此立譬本及南曰眾草為卉草之總名也卉有叢木有林戒環曰大千同為一地而有山川溪谷之高下譬一真境而有三界諸趣之別也卉木同生一地而有種類名色之各異譬一法性而有三乘大小之辯也密雲彌布遍覆三千大千世界一時等澍其澤普洽及南曰一雲所雨大千普洽譬一音密闡大小均被也戒環曰雲喻慈意澤喻法意言密雲者雲不密則不能等澍慈不密則不能廣利卉木叢林及諸藥草小根小莖小枝小葉中根中莖中枝中葉大根大莖大枝大葉諸樹大小隨上中下各有所受一雲所雨稱其種性而得長生華菓敷實祥邁曰木質曰幹草質曰莖皆依根而立根譬種性莖譬發心根葉譬所熏教理花果譬所修行果謂三乘種性發心熏習之不同同是一音教澤之被而各有所成也戒環曰喻真知冥化物物自遂也根莖大小總辯草木以明根機有異諸樹大小總結草木以明一雨是同天以一雲一雨而滋眾物稱其大小種性曾無夭閼使為花者敷為果者實各各自遂則佛之真知冥化若此而矣雖一地所生一雨所潤而諸草木各有差別及南曰群生亦類也所賦一性所化一道而有三乘之殊者亦機自異耳戒環曰草木皆植類樹之一地同潤之一雨同而有大小之殊者根自異也迦葉當知如來亦復如是出現於世如大雲起以大音聲普遍世界天人阿修羅如彼大雲遍覆三千大千國土祥邁曰天人修羅為三善道不言三惡道為障重非機也戒環曰明佛出興廣覆群有雲起無心喻無緣慈也大音聲即廣長舌相之音也於大眾中而唱是言我是如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊未度者令度未解者令解未安者令安未涅槃者令得涅槃及南曰此敘佛初坐道場唱顯化跡宣度生事使知聖人出興之意也戒環曰超證菩提曰度了達萬法曰解離眾結縛曰安究竟永寂曰涅槃今世後世如實知之我是一切知者一切見者知道者聞道者說道者汝等天人阿修羅眾皆應到此為聽法故及南曰此示正知見欲廣開悟也如是唱者為警群機故召天人使令听受戒環曰今世後世如實知者以實相智了三世事如華嚴一念普觀無去來住也一切知一切見者以佛知見徹了諸法也知道者言已先知先覺也開道者能以是道開覺後人也說道者能以是道方便演說也如來于時觀是眾生諸根利鈍精進懈怠隨其所堪而為說法種種無量皆令歡喜快得善利及南曰根有無量而皆令利喜是謂冥化戒環曰所來之眾根性不同佛各隨其所堪而化之以堪人天者為說十善堪二乘者為說諦緣堪大乘者為說六度以至定不定性人非人類各隨所堪而為說法是諸眾生聞是法已現世安隱後生善處以道受樂亦得聞法既聞法已離諸障礙於諸法中任力所能漸得入道如彼大雲雨於一切卉木叢林及諸藥草如其種性具足蒙潤各得生長祥邁曰明作成之利也聞法安隱者眾生汩於塵勞二乘縛於空寂聞是法者足以滌塵勞解縛着釋然物外優遊一生此現世安隱也戒環曰後生善處即聞法之報以道受樂即修道之果言以道者各隨其道受樂不同也善十善則受人天樂修諦緣即受二乘樂修六度則受菩薩樂各以其道也離諸障礙者惡道離業障而之人天人天離事障而入二乘二乘離理障而入菩薩各遂其才也故曰於諸法中任力所能漸得入道如彼大雲雨於一切如來說法一相一味所謂解脫相離相滅相究竟至於一切種智其有眾生聞如來法若持讀誦如說修行所得功德不自覺知及南曰疏闡化之功也解脫相則不縛諸法離相則不合諸塵滅相則生死永盡而究竟皆至一切種智無一道也戒環曰謂如來說法方便雖多實則一相一味如一雲一雨而已解脫離滅者指一相一味之體也眾生聞持而所獲功利不自覺知者一音密闡真化冥運若天地之產百加雨露之滋眾卉自生自遂孰足以知之所以者何唯有如來知此眾生種相體性念何事思何事修何事云何念云何思云何修以何法念以何法思以何法修以何法得何法眾生住於種種之地唯有如來如實見之明了無礙如彼卉木叢林諸藥草等而不自知上中下性及南曰此明觀根逗教不佛其性故物得自遂也三乘種類性欲不同故念思修得亦各不同唯如來能知能化而彼不自知也戒環曰念何事等謂或念人天事乃至聲聞菩薩事也云何念等謂或正或邪有為無為也以何法念等謂或以大小頓漸或以定慧覺觀也以何法得謂或以四諦得聲聞法乃至或以六度得菩薩法也如是念思所住各不同是謂住於種種之地如來皆能如實見之如此委曲言者明如來知根之詳也如來知是一相一味之法所謂解脫相離相滅相究竟涅槃常寂滅相終歸於空佛知是已觀眾生心欲而將護之是故不即為說一切種智汝等迦葉甚為希有能知如來隨宜說法能信能受所以者何諸佛世尊隨宜說法難解難知及南曰此牒前文而前言究竟至於一切種智此言究竟涅槃常寂滅相者前依正智言此依實相言其機一也終歸於空者自解脫離滅究竟至於常寂滅相則識心緣影一切蕩盡而歸乎實相妙空非斷空也戒環曰牒前一相一味等文以明隨宜說法難解難知而歎迦葉能信受也一相一味等即一切種智所證之法如來雖知而觀眾生性欲不同旦將之護之不即明說故甚難知而迦葉能信能受是為希有授記品第六授記者謂迦葉領悟正道當踐佛位故與說來果名授記品爾時世尊說是偈已告諸大眾唱如是言我此弟子摩訶迦葉於未來世當得奉覲三百萬億諸佛世尊供養恭敬尊重讚歎廣宣諸佛無量大法於最後身得成為佛名曰光明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊國名光德劫名大莊嚴及南曰大迦葉因地事日月燈佛至佛滅後然灯續明以紫光金塗佛形像又於法華妙性開明故號光明至於國名光德劫名莊嚴皆類其因行也戒環曰諸授記文皆二十號之前為因記後為果記諸弟子觀佛多寡之不同各隨其願緣已事佛功用之不同各隨其才力也成佛果號之不同各隨其因行也國界嚴飾無諸穢惡瓦礫荊棘便利不淨其土平正無有高下坑坎堆阜琉璃為地寶樹行列者金為繩以界道側散諸寶華周遍清淨祥邁曰諸佛無雜染諂心故國界嚴飾無諸穢惡唯修清淨妙行其土平正百寶周遍淨名曰隨其心淨則佛土淨隨其心淨則一切功德淨此其證矣戒環曰依報所感皆由心地瓦礫荊棘雜心感也便利不淨染心感也坑坎堆阜諂心感也爾時大目犍連須菩提摩訶迦旃延等皆悉悚慄一心合掌瞻仰尊顏目不蹔捨爾時世尊知諸大弟子心之所念告諸比丘是須菩提於當來世奉覲三百億那由他佛供養恭敬尊重讚歎常修梵行俱菩薩道於最後身得成為佛號曰名相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊劫名有寶國名寶生及南曰法說云千二百羅漢悉亦當作佛則與記已竟於此特授迦葉上首則三聖之記不言可論而目連等心不自安如逢王饍未敢便食是以悚慄而請也戒環曰色心初破萬法皆空理事還源一切真寶須菩提昔者解空無名無相色心初破也人證實果反號名相理事還源也又其生時家初忽空今劫名有寶國名寶生亦其義也那由他即垓數其土平正頗梨為地寶樹莊嚴無諸丘坑沙礫荊棘嚴利之穢寶華嚴地周遍清淨其土人民皆處寶臺珍玅樓閣聲聞弟子無量無邊筭數譬喻所不能知諸菩薩眾無數千萬億那由他佛壽十二小劫正法住世二十小劫像法亦位二十小劫其佛常處虗空為眾說法度脫無量菩薩及聲聞眾戒環云所舉十號明正報劫國莊嚴明依報華樹臺閣皆悉寶成應劫國之名也其佛常處虛空說法者示因空悟解伏由知證實也化城喻品第七化城謂佛化道所成者非本有也以畢竟空寂為莊嚴園林以無漏法樹為周匝浴池以八解定水為渠流樓閣以空無相無作為重關而方便其入門也佛告諸比丘乃往過去無量無邊不可思議阿僧祇劫爾時有佛行大通智勝如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其國名好成劫名大相祥邁曰眾生覺体本來若此但為有迷色心之內故小而不大封滯無量之殼故礙而不道潛伏妄識之而故劣而不勝夫能了色心之迷渫破無明之封殼則勝智現前與佛無別矣戒環曰大通智勝者一乘實智之果佛也其智之體囊括十虗為大徹照塵劫為通物無與守為勝以迹言之則釋迦因地之宗師以理推之則眾生本源之覺體也言過無量不思議劫者明此智體其來無始非情塵數量所及也諸比丘彼佛滅度已來甚大久遠譬如三千大千世界所有地種假使有人磨以為墨過於東方千國土乃下一點大如微塵又過千國土復下一點如是展轉盡地種墨於汝等意云何是諸國土若筭師若筭師弟子能得邊際知其數不不也世尊諸比丘是人所經國土若點不點盡抹為塵一塵一劫戒環曰諸比丘如是將明極多之地設此為種以出生餘地假使有人下乃舉極多之地諸比丘下乃數極多之劫及南曰法說明所化之因但舉成佛已來而不言劫數于說則舉一方億佛所教化之事至此則舉塵劫因緣其對上中下根明矣戒環曰智勝無古無今未始滅度而彼佛滅度如是久遠者對下根迷清言之耳若吾輩者失滅勝智迷淪已來不知過若干劫耶誠不可以塵墨數也彼佛滅度已來復過是數無量無邊百千萬億阿僧祇劫我以如來知見力故觀彼久遠猶若今日偈云如來無礙者知彼佛滅度及聲聞菩薩如見今滅度此頌釋迦之大通也戒環曰以眾生知見則迷淪妄計故智勝之佛隔塵墨劫以如來知見則古今一時故觀彼久遠猶若今日此又釋迦之大通也佛告諸比丘大通智勝佛壽五百四十萬億那由他劫其佛本坐道場破魔軍已垂得阿耨多羅三藐三菩提而諸佛在前如是一小劫乃至十小劫結加趺坐身心不動而諸佛法猶不在前戒環曰法身慧命其來無始則天百萬億該劫猶為應緣之壽不足多也祥邁曰根有利鈍故人有頓漸劫有久暫也王子讚曰為度眾生故於無量億歲爾乃得成佛此應機若此戒環曰所謂佛法者一乘實智佛知見也上根頓悟即成佛道下根障重必假漸修今大通經十小劫猶不現前乃應下根示現而已盖下根因十使煩惱惑障失滅勝智勝智甚大久遠勢須積行次第斷治故言自一小劫至十小劫斷盡惑障智乃現前所以大通應機若此爾時忉利諸天先為彼佛於菩提樹下敷師子座高一由旬佛於此坐當得阿耨多羅三藐三菩提行簡子曰由旬此方一驛地也即四十里又云十六里及南曰此敘大通將坐道場諸天設眾請佛也戒環曰或謂本坐道場佛法不現移坐於此即得菩提表遣迹忘緣然後契道然下云適坐此座滿十小劫殆非移坐即得適坐此座時諸梵天王雨眾天華面百由旬香風時來吹去萎華更雨新者如是不絕滿十小劫供養於佛乃至滅度常雨此華四王諸天為供養佛常擊天鼓其餘諸天作天伎樂滿十小劫至于滅度亦復如是戒環曰適坐初坐也初坐而雨華作樂乃至滅度亦復如是言諸天欽向之生也諸此丘大通智勝佛過十小劫諸佛之法乃現在前成阿耨多羅三藐三菩提戒環曰表十使惑盡勝智圓現成最正覺其佛未出家時有十六子其第一者名曰智積及南曰心明之子一名有意亦有積之義戒環曰諸佛應迹本為表法燈明未出家有八子大通未出家有十六子皆表在纏八識前對上根正而不邪故唯八而已此對下根邪正兼混故有十六一名智積者由智有所積故為在纏之識若運而無積斯為大通勝智矣諸子各有種種珍異翫好之具聞父得成阿耨多羅三藐三菩提皆捨所珍往詣佛所諸母涕泣而隨送之祥邁曰燈明之子止言領四天下表上根唯四大為累而已智勝之子言各有種種玩好者表下根有種種欲深心所着之績戒環曰珍詣佛者以其有積則未能大通能捨欲者乃證通智也王子所養之母不一故言諸母涕泣而隨以愛難遽捨也佛告諸比丘大通智勝佛得阿耨多羅三藐三菩提時十方各五百萬億諸佛世界六種震動其國中間幽瞑之處日月威光所不能照而皆大明其中眾生各得相見咸作是言此中云何忽生眾生祥邁曰夫人以五蘊眾相和合有生而封蔀無明誠非日月威光所能照燭及乎勝智開明乃知眾生之相從芒芴間忽然幻有亦若是矣戒環曰眾生以無明固結感地大礙而不通障蔽妙明故諸佛得道皆動地放光示飜破無明顯發智光也其國中間幽瞑之處即所謂鉄圍兩山黑暗之間也其中眾生昔處幽瞑各不相見因明乃見故疑忽生也又其國界諸天宮殿乃至梵宮六種震動大光普照遍滿世界勝諸天光戒環曰諸天雖有常光不及佛光爾時東方五百萬億諸國土中梵天宮殿光明照耀倍於常明諸梵天王各作是念今者宮殿光明昔所未有以何因緣而現此相是時諸梵天王即各相詣共議此事時彼眾中有一大梵天王名救一切為諸梵眾而說偈言戒環曰諸天有大威德者將生則祥光先見名大德天偈曰我等諸宮殿光明昔未有此是何因緣宜各共求之為大德天生為佛出世間而此大光明遍照於十方爾時五百萬億國土諸梵天王與宮殿俱各以衣裓盛諸天華共詣西方推尋是相見大通智勝如來處于道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪祥邁曰此言尋光詣佛戒環曰諸天有隨身宮殿故云與宮殿俱即時諸梵天王頭面禮佛繞百千匝即以天華而散佛上其所散華如須彌山并以供養佛菩提樹其菩提樹高十由旬華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願垂納處戒環曰以華散佛所以尋師并以供樹所以重道華如須彌山樹高十由旬皆佛根身之量感變也譬龍王降雨洪注十方豈彼水之能多所變在龍而已爾時諸梵天王偈讚佛已各作是言唯願世尊轉於法輪度脫眾生開涅槃道戒環曰涅槃道即脫生死輪回之妙道也爾時大通智勝如來受十方諸梵天王及十六王子請即時三轉十二行法輪及南曰示相者示四諦之行相使知向方即見道位也勸修者示四諦之功利使知修行即修道位也作證者示我已證汝亦應證即無學位也戒環曰三轉者示相轉勸修轉作證轉令入見修無學三位也又三轉者泛應三根若下根須三中根可二上根唯一若上上根則目擊道存不容聲矣有所謂十二教法輪有所謂十二行法輪教為能轉行為所轉依示勸證三轉四諦即十二教法輪也依見修學三悟四諦即十二行法輪也若沙門婆羅門若天魔梵及餘世間所不能轉謂是苦是苦集是苦滅是苦滅道及南曰若沙門四句謂此等未能正證則雖轉唯滯言詮謂是苦下示所轉之相即四諦法也祥邁曰皆謂之苦者四諦因苦而設為滅苦之道故也戒環曰生老病死等八現前逼惱曰苦煩惱結業召致未來八苦曰集此通三世謂過去集致現在苦現在集致未來苦也結業盡則生死八苦永盡曰滅治結業則修三十七道品曰道及廣說十二因緣法無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱無明滅則行滅行滅則識滅識滅則名色滅名色滅則六入滅六入滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱滅及南曰夫四諦十二緣名一而義多有所謂小乘生滅四諦則依分段生死名苦煩惱及業名集擇滅生空智品名道有所謂大乘無四諦則依知障名集無住涅槃名滅法空智品者道或曰八諦即合上言之又有無量四諦則依一乘圓頓而說即諸苦集明第一義外求滅道了無所得是謂四聖諦也十二緣亦如之故諦緣之法雖屬二乘實通大乘其要皆為斷生死本滅無明因使復還本明妙性而已凡為道有教當深乎此戒環曰廣四諦說十二緣也自無明緣行至生緣老死等示生起相即廣苦集二諦而說也自無明滅至憂悲苦惱滅示修斷相即廣滅道二諦而說也四諦為下根聊陳麤相所本在跡十二緣為中根細觀四諦所本在心謂性智本明妙湛精了由妄塵瞥起俄然晦昧名無明於無明體一念初動名行晦昧搖動則失彼精了粘湛發知故轉智名識十二緣中此三為根本餘九為支末相因以成三世之緣耳智本無知由識故知形為妄心謂之名乃六賊之主也性本無生由識故生形為幻質謂之色即四陰之依也則名色者識初托胎凝滑之相也由凝滑而具六根名六入根成出胎根與境交名觸領納前境名受有所受故愛心生而愛斯取之由愛取故惑業相結善惡有狀名有由諸有結為三界之生因名生有生則老死苦惱隨之矣此生起之相也將欲滅之以何為要耶當知彼無明者非實有體初一心源廓然妙湛由知見立知妄塵瞥起故有無明若知見無見則智性真淨復還妙湛洞徹精了名無明滅則自行已下莫不皆滅盖本既不存未無所附此修斷之相也佛於天人大眾之中說是法時六百萬億那由他人以不受一切法故而於諸漏心得解脫皆得深妙禪定三明六通具八解脫及南曰聖凡一体迷悟同原人者苟能悟患累之由達汩昏之始果亦於法不受則禪定解脫六通三明皆可得矣戒環曰此於初會聞法獲益之利根也不受一切法者悟諦緣空了無所著也盖心本解脫有受故累性本明定有著故昏是以不受一切法故遂於諸漏心得解脫又得禪定三明六通第二第三第四說法時千萬億恒河沙那由他等眾生亦以不受一切法故而於諸漏心得解脫從是已後諸聲聞眾無量無邊不可稱數及南曰從是已後非一席說又有小根獲益其數不計戒環曰此於次第聞法獲益中下之根也利根一聞千悟中下多聞少悟故至於第三第四時乃獲益也爾時十六王子皆以童子出家而作沙彌諸根通利智慧明了已曾供養百千萬億佛淨修梵行求阿耨多羅三藐三菩提戒環曰十六王子聞法獲益於是出家復求大乘俱白佛言世尊是諸無量千萬億大德聲聞皆已成就世尊亦當為我等說阿耨多羅三藐三菩提法我等聞已皆共修學世尊我等志類如來知見深心所念佛自證知此正敘請說法華也然前所請皆願轉無上輪而大通說諦緣之法又待此請者諸佛說法皆自漸之頓藉權顯實盖導之無漸則駭而不信非惟教不陵節亦欲學不躐等故也戒環曰皆已成就謂已成就大志故請說大法我等志願下自陳大志望說大法也如來知見即所謂一大事也爾時彼佛受沙彌請過二萬劫已乃於四眾之中說是大乘經名妙法蓮華教菩薩法佛所護念及南曰釋迦現壽八十而四十年說般若等教大通現壽五百萬億那由他劫則宜於二萬然說也戒環曰過二萬劫乃久嘿斯要以待機也則二萬劫前且說方等般若之教偈云說六波羅蜜及諸神通事是也佛說是經於八千劫未曾休廢說此經已即入靜室住於禪定八萬四千劫戒環曰未曾休廢者所謂熾然說無間也是時十六菩薩沙彌知佛入室寂然禪定各陞法座亦於八萬四千劫為四部眾廣說分別妙法華經一一皆度六百萬億那由他恒河沙等眾生示教利喜令發阿耨多羅三藐三菩提心為疑惑之眾曲講也十六王子表在纏八識十六菩薩表出纏八智然有十六者示以八正伏八邪也戒環曰於八萬劫各度多眾者表既得大通之道則八萬法門無所不通故非唯八正為妙智雖八邪亦妙智也非唯八正之能度雖八邪亦能度也所謂聖性無不通逆順皆方便唯其如此故各能演妙至於窮劫各能度眾至於恒沙不如是不足為大通之道大通智勝佛過八萬四千劫已從三昧起往詣法座安詳而坐普告大眾是十六菩薩沙彌甚為希有諸根通利智慧明了已曾供養無量千萬億數諸佛於諸佛所常修梵行受持佛智開示眾生令人其中汝等皆當數數親近而供養之戒環曰可其所說讚其德行使眾親附也所以者何若聲聞辟支佛及諸菩薩能信是十六菩薩所說經法受持不毀者是人皆當得阿耨多羅三藐三菩提如來智慧戒環曰三乘得妙則同歸一乘佛告諸比丘是十六菩薩常樂說是妙華經一一菩薩所化六百萬億那由他恒河沙等眾生世世所生與菩薩俱從其聞法悉皆信解以此因緣得值四萬億諸佛世尊于今不盡戒環曰徵昔所化會今之緣也所化之眾常與師俱者為化緣深故以是得值億萬多佛其緣未盡今復相值諸比丘我今與汝彼佛弟子十六沙彌今皆得阿耨多羅三藐三菩提於十方國土現在說法有無量百千萬億菩薩聲聞以為眷屬其二沙彌東方作佛一名阿閦音畜在歡喜國二名須彌頂祥邁曰經云毀譽不動如須彌此佛出應群動而其體無動又在動國示即動而靜也二佛並化其德相資故雖二名可以合釋戒環曰陳十六王子成佛名迹也天地設位道運乎其中聖人法之以開物成務冐天下之道故八方之佛各依一方而示一德所以開物所以成物原始要終則天下之道無不冐矣東方震為動歡喜亦動也阿閦云無動須彌頂又無動之極也東南方二佛一名師子音二名師子相及南曰此佛以慈柔應物以無畏說法戒環曰東南巽為柔順師子音者所說無畏師子相者所示無畏南方二佛一名虗空住二名常滅及南曰不復更滅是謂常滅戒環曰南方離為虗明虗空住者體至虗以應群實也常滅者了一切法當體虗凝即寂滅相西南方二佛一名帝相二名梵相及南曰此佛以神應物物資以生而其德常淨不累於物戒環曰西南坤為資生帝相者神出而應物為帝梵淨也西方二佛一名阿彌陀二名度一切世間苦惱及南曰此佛於毀拆之際示無量壽則了無生死以救度世間生死苦惱戒環曰西方兌為毀拆阿彌陀云無量壽世間苦惱即生死無常也西北方二佛一名多摩羅䟦旃檀香神通二名須彌相及南曰此佛神通應物如乾道不息寂然不動感而遂通戒環曰西北乾為剛徤多摩羅旃檀香清遠潛通以比神通須彌相亦無動義北方二佛一名雲自在二名雲自在王及南曰此佛以無緣慈覆陰利澤險難眾生而無心無着如雲之自在戒環曰北方坎為險陷雲自在謂無心而利物雲自在王又自在之至也東北方佛名壞一切世間怖畏此佛於生死畏中以一真凝常開覺群物使入於不死不生則怖畏壞矣戒環曰東北艮為萬物成始成終之所始終之理在物為成壞在人為生死乃世間之所怖畏也第十六我釋迦牟尼佛於娑婆國土成阿耨多羅三藐三菩提或曰八卦乃中夏之書引配竺教豈佛意耶及南曰竺夏一天下耳壃畿所及方位所同卦乃天地自然之理獨不同哉伏羲畫以示人吾佛象以設法各默得其同耳今經雖無八卦之文顯有八方之象借事明理烏乎不可戒環曰釋迦牟尼云能仁寂默謂其德仁濟群類其道寂默無為以示化堪忍故號能仁此繼東北方而特標者大覺雖具成始成終之德而其道圓應不滯方隅無始無終為眾德之總故也盖自無動而出應群動能柔能剛說示無畏虗己應物現壽運神乃至濟險滅怖無非釋迦隨宜之行故歷言八方佛德而以釋迦總之斯乃範圍天地曲成萬物無方無體之至德也非成無上正道何以與此故曰釋迦牟尼於娑婆國成阿耨菩提諸比丘我等為沙彌時各各教化無量百千萬億恒河沙等眾生從我聞法為阿耨多羅三藐三菩提此諸眾生于今有住聲聞地者我常教化阿耨多羅三藐三菩提是諸人等應以漸入佛道戒環曰明昔因今緣使知功行已深而成就之也舉為沙彌所化明昔因也于今所化明今緣也應以是法漸入佛道即成就之也所以者何如來智慧難信難解祥邁曰釋上既曠劫蒙教今猶漸入者以如來智慧難信解故戒環曰眾生莫不有如來智慧而難解若此者塵習自障故也以今人觀之幸聞正法不無宿因安知吾徒非智勝之遺塵非未來之弟子然緣障尚稠道果渺邈即曠劫蒙教今猶漸入者也若能勤進猶可庶幾設復退墮又安知未來之期比前塵劫不復過於是數耶然則所謂難解者非佛智之難機自難耳諸比丘若如來自知涅槃時到眾又清淨信解堅固了達空法深入禪定便集諸菩薩及聲聞眾為說是經世間無有二乘而得滅度唯一佛乘得滅度耳及南曰前明始權此會終實也祥邁曰無有二乘即前更無餘乘意也戒環曰涅槃時到言化緣將畢眾又清淨言根機已熟眾清淨者已於藏教斷惑除結也信堅固者已於通教心相體信也了達空法謂已悟般若深入禪定謂妙造玄源如此則諸病已除醫方亦遣故廢三權特明一實得滅度者得真常道果也比丘當知如來方便深入眾生之性知其志樂小法深著五欲為是等故說於涅槃是人若聞則便信受戒環曰為樂小者權說小果彼便信受如滯化城譬如五百由旬險難惡道曠絕無人怖畏之處及南曰譬諸生死煩惱惡道險難長遠也祥邁曰曠絕無人等譬生死長遠無真知見妄起怖畏戒環曰五百由旬舊說尤多今取二乘斷三界結惑離分段生死證有餘涅槃是過三百由旬而至化城然常滯變易生死若回心向大進至七地斷盡習氣是過四百由旬近於寶所又進八地已上斷盡無明離變易生死證無餘涅槃是過五百由旬到寶所也若有多眾欲過此道至珍寶處有一導師聰慧明達善知險道通塞之相將導眾人欲過此難戒環曰若有眾多三句譬三乘求佛者又曰善則通惡則塞乃可無難戒環曰導師指津之人譬釋尊也通斯進之塞斯止之通譬斷惑塞譬起障所將人眾中路懈退白道師言我等疲極而復怖畏不能復退前路猶遠今欲退還戒環曰譬二乘求道難進易退導師多諸方便而作是念此等可愍云何捨大珍寶而欲退還作是念已以方便力於險道中過三百由旬化作一城告眾人言汝等勿怖莫得退還今此大城可於中止隨意所作若入是城快得安隱若能前至寶所亦可得去戒環曰譬因二乘斷三界結惑后息以小果而進之智地也隨意所作即任力所能漸得入道之義是時疲極之眾心大歡喜嘆未曾有我等今者勉斯惡道快得安隱戒環曰稱願息之心故也爾時導師知此人眾既得止息無復疲倦即滅化城語眾人言汝等去來寶處在近向者大城我所化作為止息耳化非真有故斯須即滅唯寶所為真權非實有故終竟而廢唯一乘為實諸比丘如來亦復如是今為汝等作大導師知諸生死煩惱惡道險難長遠應去應度若眾生但聞一佛乘者則不欲見佛不欲親近便作是念佛道長遠久受勤苦乃可得成及南曰上言惡道長遠此言佛道長遠者上以正見觀眾生此以倒見觀佛道故也又曰苟無生死無惑業則常體凝淨何復何治長遠之見切苦之功了無此致咎佛道遂生懈退大覺所以敘其倒見而誘進之戒環曰若但聞一乘而無權濟則厭大而不欲見佛憚煩而憂其道遠故須權濟也佛道初不遠人本無修證特由生死背馳復之之難故見其長遠惑業積障治之之難故見其勤苦則長遠勤苦由倒妄起何關於道哉佛知是心怯弱下劣以方便力而於中道為止息故說二涅槃若眾生住於二地如來爾時即便為說汝等所作未辦汝所住地近於佛慧當觀察籌量所得涅槃非真實也但是如來方便之力於一佛乘分別說三如彼導師為止息故化作大城既知息已而告之言寶處在近此城非實我化作耳戒環曰中道即大小乘之中間也二涅槃即二乘涅槃云下二地是也又曰住於二地謂滯二乘權果而不知進故語之佛慧令觀察籌量而進取實果也五百弟子授記品第八此滿慈與五百羅漢隨機領悟佛為述成與記爾時富樓那彌多羅尼子從佛聞是智慧方便隨宜說法又聞授諸大弟子阿耨多羅三藐三菩提記復聞宿世因緣之事復聞諸佛有大自在神通之力得未曾有心淨踊躍即從座起到於佛前頭面禮足却住一面瞻仰尊顏目不蹔捨戒環曰聞方便隨宜通領三周之說也又聞大記通領舍利弗等受記事也復聞因緣即別領大通之事復聞神力別領導師神化之事罕聞故得未曾有惑除故心淨踊躍而作是念世尊甚奇特所為希有隨順世間若干種性以方便知見而為說法拔出眾生處處貪著我等於佛功德言不能宣唯佛世尊能知我等深心本願前乃經家敘置此正滿慈之蹄深心本願謂精進護持助宣佛法乃至過去未來助宣之士非謂願求記也戒環曰言奇特希有至處處貪著總嘆三周說法也我等於佛功德言不能宣總歎授記乃至導師神化之德不能備宣也唯佛世尊已下申本願而誓護持也爾時佛告諸比丘汝等見是富樓那彌多羅尼子不我常稱其於說法人中最為第一亦常歎其種種功德精進護持助宣我法能於四眾示教利喜具足解釋佛之正法而大饒益同梵行者自捨如來無能盡其言論之辨及南曰說法第一述其正行也種種功德述其眾行也精進護持述其本願也言論之辨述其才辨也戒環曰述成其深心本願也問眾見不者以眾等徒知滿慈之迹而不知其深行故開端以示之汝等勿謂富樓那但能護持助宣我法亦於過去九十億諸佛所護持助宣佛之正法於彼說法人中亦最第一又於諸佛所說空法明了道達得四無礙智常能審諦清淨說法無有疑惑具足菩薩神通之力隨其壽命常修梵行彼佛世人咸皆謂之實是聲聞而富樓那以斯方便饒益無量百千眾生又化無量阿僧祇人令立阿耨多羅三藐三菩提為淨佛土故常依佛事教化眾生祥邁曰上總述此廣陳也淨名云菩薩隨所化眾生而取佛土所謂淨佛土者自淨其心以致佛土之淨也為淨佛土而必須教化眾生者要即塵勞而能淨非若二乘厭塵勞以求淨也由是觀之其本乃大權聖人示現弘法耳故偈以內秘外現頌之及南曰樓那內祕外現為眾綱領故備述之戒環曰舉九十億佛所即廣陳護宣遠因也於佛空法明了通達者非若二乘滯於斷空也得四無礙清淨說法者如所如說不泥名相也菩薩神通非二乘比也隨其壽命言盡形壽也令立菩提者令於正道有立也為淨佛土故化眾生者藉利他行成己行也諸比丘富樓那亦於七佛說法人中而得第一今於我所說法人中亦為第一於賢劫中當來諸佛說法人中亦復第一而皆護持助宣佛法亦於未來護持助宣無量無邊諸佛之法教化饒益無量眾生令立阿耨多羅三藐三菩提為淨佛土故常勤精進教化眾生漸漸具足菩薩之道祥邁曰上陳遠因此舉三世皆明說法宣化之深行也補註曰三劫三千佛其初千人於莊嚴劫成佛華光為首至毗舍浮是也其次千人於賢劫成佛拘留孫為首至樓至是也其后千人於星宿劫成佛日光為首至須彌相是也戒環曰七佛即毗婆尸尸棄毗舍浮拘留孫拘那含迦葉釋迦是也上三屬前劫下四屬今劫三劫三千佛始於妙光佛末法出家修道聞五十三佛名深心仰慕復化他人滿三千眾深心敬禮即超多劫生死之罪得證佛果過無量阿僧祇劫當於此土得阿耨多羅三藐三菩提號曰法明如來應供正遍智明行足善逝世間解無上士調御丈夫天人師佛世尊華嚴記發心菩薩過千不可說劫當得作佛號清淨心論謂明達如是劫量法門總清淨故正此意也餘記劫數深意並同戒環曰滿慈既於多佛植因之遠而猶過僧祇劫乃得菩提號法明者謂於無數劫量法門一時明達即成佛道非如情見久遠劫也其佛以恒河沙等三千大千世界為一佛土七寶為地地平為掌無有山陵谿㵎溝壑七寶臺觀充滿其中諸天宮殿近處虗空人天交接兩得相見無諸惡道亦無女人一切眾生皆以化生無有婬欲戒環曰此皆依報清淨之相由因中常修梵行廣化眾生令立正道故果地無邪穢之事而交接皆上善之人也得大神通身出光明飛行自在志念堅固精進智慧普皆金色三十二相而自莊嚴及南曰以世考之精華之氣或化列星吐納之人猶能輕舉則滓濁既盡妙體精明飛行自在無足疑矣戒環曰既以化生離諸欲染故本來體相淨妙若此如是妙體人固有之特為麤濁欲惡染蔽而已故阿難曰欲氣麤濁腥臊交遘不能發生勝淨妙明紫金光聚苟斷欲愛不受胎生則本來體相無復染蔽通光莊嚴自能發現其國眾生常以二食一者法喜食二者禪悅食有無量阿僧祇千萬億那由他諸菩薩眾得大神通四無礙智善能教化眾生之類其聲聞眾筭數校計所不能知皆得具足六通三明及八解脫行簡子曰八解脫一有色觀諸色因無色想觀外諸色三淨勝解身作證四超色想滅有時想不思惟種種想入無邊空超五超空無邊處入無邊識處六超識無邊處入無所有所七超無所有處入非想非非想處八超一切非想非非想處入滅想處也戒環曰不由胎藏故不假段食唯飡采法喜禪脫而已有無量下明國土人民諸菩薩下明同得法侶滿慈具足菩薩神通之力得四無礙智審諦說法教化眾生明了通達故報緣法眾其德皆類其佛國土有如是等無量功德莊嚴成就戒環曰此結前也劫名寶明國名善淨其佛壽命無量阿僧祇劫法住甚久佛滅度後起七寶塔遍滿其國祥邁曰國名善淨盖心清淨故佛土淨也行簡子曰七寶者金輪寶白象寶如意寶玉女寶主藏寶主兵寶紺馬寶也戒環曰劫有法寶真明故名寶明國無女人惡道故名善淨由三世說法續佛壽命故佛壽無量法住甚久滅後起塔遍滿其國又以餘德散沾也爾時千二百阿羅漢心自在者作是念我等歡喜得未曾有若世尊各見授記如餘大弟子者不亦快乎佛知此等心之所念告摩訶迦葉是千二百阿羅漢我今當現前次第與授阿耨多羅三藐三菩提記戒環曰千二百阿羅漢請記世尊通許之而特告迦葉者以迦葉為眾上首故告之於此眾中我大弟子憍陳如比丘當供養六萬二千億佛然後得成為佛號曰普明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊及南曰普明謂以智慧明破諸癡暗普使眾生明了法性即今住世應真之首也戒環曰憍陳最初得度為眾首故特記之號普明者偈云常放大光明一切之所敬又云常說無上道故號曰普明其五百阿羅漢優樓頻螺迦葉伽耶迦葉那提迦葉迦留陀夷優陀夷阿㝹樓駄離婆多劫賓那薄拘羅周陀莎伽陀等皆當得阿耨多羅三藐三菩提盡同一號名曰普明祥邁曰優樓頻螺等即序分所列羅漢上首詳略等舉也同號普明以德同故戒環曰五百威德具足為千二之傑故又別記目連記末云我諸弟子威德具足其教五百即此也餘七百眾但於前通許於頌通記爾時五百阿羅漢於佛前得授記已歡喜踊躍即從座起到於佛前悔過自責世尊我等常作是念自謂已得究竟滅度今乃知之如無智者所以者何我等應得如來智慧而便自以小智為足戒環曰悔責者悔昔之失慶今之得也如來智慧即一切種智我等應得而悔不早悟世尊譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去其人醉臥都不覺知起已遊行到於他國為衣食故勤力求索甚大艱難若少有所得便以為足行簡子曰弃其至寶而營營外索者天下比比是也不亦深可哀哉列子好忘之喻類此戒環曰親友繫珠譬佛預十六菩薩時為說法華結大乘因也醉酒而臥譬我喻千萬億眾時皆生疑惑昏昏如醉也官事當行即佛化將畢餘處利生公而不黨故譬官事起已遊行轉迷也到於他國弃本也為衣食等樂小也於後親友會遇見之而作是言咄哉丈夫何為衣食乃至如是我昔欲令汝得安樂五欲自恣於某年日月以無價寶珠繫汝衣裏今故現在而汝不知勤苦憂惱以求自活甚為癡也汝今可以此寶貿易所須常可如意無所乏短戒環曰親友會遇譬今復值佛咄叱警戒譬呵小進大言丈夫者指大乘種性而警進之也餘意如下合顯貿易所須譬即性發揮當得大利也以時物迁貨曰貿以有易無曰易佛亦如是為菩薩時教化我等令發一切智心而尋癈忘不知不覺既得阿羅漢道自謂滅度資生艱難得少為足一切智願猶在不失戒環曰令發智心而廢忘不覺如係珠醉臥也既得羅漢而未離法縛是資生艱難也智願不失如衣珠現在今者世尊覺悟我等作如是言諸比丘汝等所得非究竟滅我久令汝等種佛善根以方便故示涅槃相而汝謂為實得滅度戒環曰叱世尊我今乃知實是菩薩得受阿耨多羅三藐三菩提記以是因緣甚大歡喜得未曾有戒環曰此合貿寶如意也授學無學人記品第九此記小聲眾也研真斷惑名學真窮惑盡名無學此未得無學而亦預佛記者若有聞法者無不成佛故也爾時阿難羅睺羅而作是念我等每自思惟設得受記不亦快乎觀學眾記云當供徹塵數佛護持法藏即與阿難羅云同德故以二師總之戒環曰阿難多聞護持法藏羅云密行皆大弟子而與學眾同授記者示彼亦內秘外現密行之儔也即從座起俱白佛言世尊我等於此亦應有分唯有如來我等所歸又我等為一切世間天人阿修羅所見知識阿難常為侍者護持法藏羅睺羅是佛之子若佛見授阿耨多羅三藐三菩提記者我願既滿眾望亦足及南曰菩薩為通達佛道無所不現故淨名佛道品以法喜為妻慈悲為女誠善為男而釋迦所以有邪輸羅云皆為示現非同世俗妻子也戒環曰阿難羅云親邇於佛既為眾所見知若不得記則無塞眾望也爾時佛告阿難汝於來世當得作佛號山海慧自在通王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊當供養六十二億諸佛護持法藏然後得阿耨多羅三藐三菩提祥邁曰山海慧自在通王者高莫逾於山深莫浚於海戒環曰阿難宿持法藏多聞愽達智慧等之於諸法中得大通達自在如王故得果以因為號當供多佛護持法藏然後成佛盖其本願也教化二十千萬億恒河沙諸菩薩等令成阿耨多羅三藐三菩提國名常立勝幡其土清淨琉璃為地却名妙音遍滿及南曰阿難當來作成如此其多者為宿持法藏化緣深故戒環曰幡表尊勝之德阿難多聞第一故國名常立勝幡宣傳法藏故却名妙音遍滿為由法音宣流也其佛壽命無量千萬億阿僧祇劫若人於千萬億無量阿僧祇劫中筭數校計不得知正法住世倍於壽命像法住世復倍正法問壽劫之說悠然不窮無所據依及南曰萬物死生而不已者存壽有終窮乎古今代謝而曾無紀極劫有終窮乎聖人離死生至道無代謝則雖倍倍之劫未足盡其靈長矣戒環曰佛壽無量劫而正像之法又復倍倍者由其宣傳法藏因力緜遠也行簡子補註曰佛滅度後遺法有正像末三等正法五百年像法二千年末法二千年阿難是山海慧自在通王佛為十方無量千萬億恒河沙等諸佛如來所共讚歎稱其功德戒環曰為其護持法藏報得殊勝名聞十方故爾時會中新發意菩薩八千人咸作是念我等尚不聞諸大菩薩得如是記有何因緣而諸聲聞得如是決戒環曰阿難果號劫國教化作成等事特異眾記初心不知遠因故疑其何緣而得爾時世尊知諸菩薩心之所念而告之曰諸善男子我與阿難等於空王佛所同時發阿耨多羅三藐三菩提心阿難常樂多聞我常勤精進是故我已得成阿耨多羅三藐三菩提而阿難護持我法亦護將來諸佛法藏教化成就諸菩薩眾其本願如是故獲斯記戒環曰此告其遠因以同佛發心功深願廣宜得是記也俱舍論說空王佛乃釋迦三僧祇劫中間所逢之佛及南曰校其遠因則功已齊佛但彼願護持法藏故常樂多聞佛願成道利生故常勤精進由是佛已成道而阿難尚須護法教化然後成佛盖其本願如是非由根智勝劣而有先後也阿難面於佛前自聞授記及國土莊嚴所願具足心大歡喜得未曾有即時憶念過去無量千萬億諸佛法藏通達無礙如今所聞亦識本願戒環曰即時憶念等者因佛與記又敘往因於是得法性覺自在三昧能憶過佛法藏又識本昔願持之因也爾時佛告羅睺羅汝於來世當得作佛號蹈七寶華如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊當供養十世界微塵等數諸佛如來常為諸佛而作長子猶如今也祥邁曰弘道以德行為尚故儒門四科亦先德行及南曰隱大權之跡而示現為佛子功德不可數唯佛能知之是謂密行也戒環曰蹈七寶華乃妙淨密行之應也作長子者常以密行繼續佛道也如華嚴以普賢為長子亦表大行能建佛家法也是蹈七寶華佛國土莊嚴壽命劫數所化弟子正法像法亦如山海慧自在通王如來無異亦為此佛而作長子過是已後當得阿耨多羅三藐三菩提戒環曰多聞密行常相資故羅云國劫正像之果並同阿難而當來亦為阿難長子爾時世尊見學無學二千人其意柔軟寂然清淨一心觀佛佛告阿難汝見是學無學二千人不唯然已見阿難是諸人等當供養五十世界微塵數諸佛如來恭敬尊重護持法藏末後同時於十方國各得成佛皆同一號名曰寶相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊壽命一劫國土莊嚴聲聞菩薩正法像法皆悉同等戒環曰此亦昔日所化故今與記其意柔軟謂根機已熟問其見不默示昔因也而阿難多聞愽達固已默知二千果號皆同以因同也了學無學即證寔相是謂寶相壽命一劫下言二千同時成佛依報法化皆同法師品第十能持正法足以師人謂之法師此授廣記以圓該前記而號法師品者所以廣記持經之人而推尊之故也爾時世尊因藥王菩薩告八萬大士藥王汝見是大眾中無量諸天龍王夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人及比丘比丘尼優婆塞優婆夷求聲聞者求辟支佛者求佛道者如是等類咸於佛前聞妙法華經一偈一句乃至一念隨喜者我皆與授記當得阿耨多羅三藐三菩提及南曰此言現前廣記祥邁曰將授廣記而因藥王告大士者以廣記渺漠法利勝妙非深知宿契及大菩薩無能證知故也藥王即喜見菩薩久持此經燒身燃臂可謂深知宿契矣戒環曰八萬大士即經首八萬菩薩現前八部四眾皆與授記者所謂若有聞法者無一不成佛也佛告藥王又如來滅度之後若有人聞妙法華經乃至一偈一句一念隨喜者我亦與授阿耨多羅三藐三菩提記及南曰此後世廣記言滅後有人則其機未兆亦懸記之則此品廣記無所不圓無所不該矣藥王若有人問何等眾生於未來世當得作佛應示是諸人等於未來世必得作佛何以故若善男子善女人於法華經乃至一句受持讀誦解說書寫種種供養經卷華香纓絡抹香塗香燒香繒盖幢幡衣服伎樂合掌恭敬是人一切世間所應瞻奉應以如來供養而供養之當知此人是大菩薩成就阿耨多羅三藐三菩提哀愍眾生願生此間廣演分別妙法華經何況盡能受持種種供養者戒環曰令藥王宣明勝因也戒環曰釋上以顯緣勝人尊故當作佛但於一句能具六種法師之功猶足推尊瞻奉而當成菩提況於一經盡能受持則其緣愈勝其人愈尊其作佛必矣藥王當知是人自捨清淨業報於我滅度後愍眾生故生於惡世廣演此經戒環曰自捨淨報者當是淨土果人示生惡世若善男子善女人我滅度後能竊為一人說法華經乃至一句當知是人則如來使如來所遣行如來事何況於大眾中廣為人說戒環曰使即將命之人遣有付托之義此令敬持經人視同將如命為如來付托讚揚大事宜在尊尚也藥王此經是諸佛秘要之藏不可分布妄授與人諸佛世尊之所守護從昔已來未曾顯說而此經者如來現在猶多怨嫉況滅度後戒環曰秘密法要妄授則上慢退席顯說則窮子怖父而怨誹憎嫉生焉如來現在尚爾況滅後惡世可不擇機藥王當知如來滅後其能書持讀誦供養為他人說者如來即為以衣覆之又為他方現在諸佛之所護念是人有大信力及志願力諸善根力當知是人與如來共宿則如來手摩其頂及南曰是經難得聞信受持亦難故凡書持讀說非假如來覆護及自有信願善根莫之能矣戒環曰為如來衣覆謂得佛忍力也與如來共宿謂栖心同佛也為如來摩頂謂蒙佛慰安也如此故能於後惡世持說是法藥王在在處處若說若讀若誦若書若經卷所住之處皆應起七寶塔極令高廣嚴飾不須復安舍利所以者何此中已有如來全身戒環曰此三周開示及餘助顯無非如來全身也此塔應以一切華香瓔珞繒盖幢幡伎樂歌頌供養恭敬尊重讚歎若有人得見此塔禮拜供養當知是等皆近阿耨多羅三藐三菩提戒環曰以供養而成佛者為其因正而緣勝故也藥王多有人在家出家行菩薩道若不能得見聞讀誦書持供養是法華經者當知是人未善行菩薩道若有得聞是經典者乃能善行菩薩之道戒環曰行菩薩道而不聞是經如欲濟渴而不知須水也其有眾生求佛道者若見若聞是法華經聞已信解受持者當知是人得近阿耨多羅三藐三菩提戒環曰此如人鑿井已近泉源藥王譬如有人渴乏須水於彼高原穿鑿求之猶見乾土知水尚遠施功不已轉見濕土遂漸至泥其心決定知水必近及南曰漸至于泥則於水已近若能脫然造其真源則妙湛圓發不勞功用視前所為皆滓濁矣經不言此者所謂引而不發使其自進盖無功用處不容言論也戒環曰高原鑿水譬修菩薩道不得其要猶見乾土施功不已譬從乾慧地由漸而進轉見濕土喻歷聞般若遂漸至泥喻初聞法華然尚滯修習則於佛智水近之而已菩薩亦復如是若未聞未解未能修習是法華經當知是人去阿耨多羅三藐三菩提尚遠若得聞解思惟修習必知得近阿耨多羅三藐三菩提所以者何一切菩薩阿耨多羅三藐三菩提皆屬此經戒環曰佛果菩提皆屬此經則未聞未解安可得道此經開方便門示真實相法華經藏深固幽遠無人能到今佛教化成就菩薩而為開示及南曰開方便門猶鑿井也示真寔相猶見水也戒環曰法華經藏即眾生如來藏也於眾生則蘊在塵勞於菩薩則蘊在萬行於寶所則過乎五百由旬可謂深固幽遠也人無能到故唯菩薩可以開示藥王若有菩薩聞是法華經驚疑怖畏當知是為新發意菩薩若聲聞人聞是經驚疑怖畏當知是為增上慢者戒環曰新發意小根有增上慢皆非機也藥王如來滅後欲為四眾說是法華經者是入如來室著如來衣坐如來座爾乃應為四眾廣說斯經如來室者一切眾生中大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是安住是中然後以不懈怠心為諸菩薩及四眾廣說是法華經及南曰以大慈悲為室以柔和忍辱為衣以諸法空為座决子聲間且入智慧譬之掘井及泉方是究竟祥邁曰一切法空者非斷空也即一切法廓然了達之謂也戒環曰夫說法教化之道必已有所處然後能安人已有所服然後能伏人已有所據然後能達人如來以慈悲為室柔忍為衣法空為座入慈悲室則已有所處也著柔忍衣則已有所服也坐法空座則已有所據也如此則具佛之體乃可廣說斯經苟未體此自無主正何以為人哉故曰安住是中然後以不懈怠廣說是法今夫據寶花座而聖讀庸行者宜深鑒乎藥王我於餘國遣化人為其集聽法眾亦遣化比丘比丘尼優婆塞優婆夷聽其說法是諸化人聞信受隨順不逆若說法者在空閑處我時廣遣天龍鬼神乾闥婆阿修羅等聽其說法戒環曰此佛力變化讚揚大事也餘國則他方世界我雖在異國時時令說法者得見我身若於此經忘失句逗我還為說令得具足戒環曰在異國而令見所謂隱顯化眾生
