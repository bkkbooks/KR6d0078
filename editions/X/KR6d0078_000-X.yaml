front:
  text: 妙法蓮華經序余少時讀普門品觀世音經雖未能深解其義然以意測之曰此佛氏之寓言也昔唐李文公問藥山禪師曰如何是惡風吹船漂落鬼國師曰李翱小子問此何為文公勃然怒形於色師笑曰發此嗔恚心便是黑風吹船飄入鬼國也吁藥師可謂善啟發人矣以是推之則知利欲熾然即是火坑貪愛沈溺便是苦海一念清淨烈焰成池一念驚覺船到彼岸災患纏縛隨寓而安我無畏怖如械自脫惡人侵凌待以橫逆我無忿嫉如獸自奔讀是經者作如是觀則知補陀大士真實為人非浪語者西山真德秀譔
